# ============================================================================
# Life Navigator - Supabase Configuration
# ============================================================================
# See: https://supabase.com/docs/guides/cli/config
# ============================================================================

project_id = "life-navigator"

# ============================================================================
# API Settings
# ============================================================================
[api]
enabled = true
port = 54321
schemas = ["public", "core", "finance", "health_meta", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

# ============================================================================
# Database Settings
# ============================================================================
[db]
port = 54322
shadow_port = 54320
major_version = 15

# ============================================================================
# Auth Configuration
# ============================================================================
[auth]
enabled = true
site_url = "http://localhost:3002"
additional_redirect_urls = [
  "http://localhost:3000",
  "http://localhost:3001",
  "http://localhost:3002",
  "https://*.vercel.app"
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false

# Email settings
[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true

# Email Templates
# These use {{ .ConfirmationURL }} which Supabase replaces with the full
# verification URL (including token_hash & type) pointing to /auth/confirm.
[auth.email.template.confirmation]
subject = "Welcome to Life Navigator - Please Confirm Your Email"
content_path = "./supabase/templates/confirmation.html"

[auth.email.template.recovery]
subject = "Reset Your Life Navigator Password"
content_path = "./supabase/templates/recovery.html"

[auth.email.template.magic_link]
subject = "Your Life Navigator Sign-In Link"
content_path = "./supabase/templates/magic_link.html"

[auth.email.template.email_change]
subject = "Confirm Your New Email Address - Life Navigator"
content_path = "./supabase/templates/email_change.html"

# OAuth Providers
# Google OAuth is configured in the Supabase Dashboard, not here.
# To use locally, set GOOGLE_CLIENT_ID and GOOGLE_CLIENT_SECRET env vars.
[auth.external.google]
enabled = false

[auth.external.apple]
enabled = false

[auth.external.github]
enabled = false

[auth.external.azure]
enabled = false

# ============================================================================
# Storage Configuration (Blob Storage)
# ============================================================================
[storage]
enabled = true
file_size_limit = "52428800"

# ============================================================================
# Realtime Configuration
# ============================================================================
[realtime]
enabled = true
ip_version = "IPv4"

# ============================================================================
# Analytics
# ============================================================================
[analytics]
enabled = true

[functions.document-ocr]
verify_jwt = false  # Uses dual-auth internally (worker-secret or JWT)

[functions.process-ingestion]
verify_jwt = false

[functions.sync-user-to-backend]
verify_jwt = false

# Plaid Edge Functions — JWT verified by Supabase Auth
[functions.plaid-link-token]
verify_jwt = true

[functions.plaid-exchange]
verify_jwt = true

[functions.plaid-accounts]
verify_jwt = true

[functions.plaid-transactions]
verify_jwt = true

[functions.plaid-disconnect]
verify_jwt = true
