# fly.toml app configuration file generated for life-nav-mvp on 2026-06-02T19:43:55Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'life-nav-mvp'
primary_region = 'lax'

[build]
  dockerfile = 'Dockerfile'

[env]
  GEMINI_EMBEDDING_MODEL = 'text-embedding-004'
  GEMINI_GENERATION_MODEL = 'gemini-2.0-flash'
  LOG_LEVEL = 'info'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/healthz'

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
