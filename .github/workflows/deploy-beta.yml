# ===========================================================================
# Life Navigator - Beta Deployment Pipeline (Cloud Run)
# ===========================================================================
# Deploys all services to Cloud Run with scale-to-zero configuration
# Uses Workload Identity Federation for secure authentication
# ===========================================================================

name: Deploy to Beta

on:
  push:
    branches:
      - beta
      - main
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'terraform/gcp/**'
      - '.github/workflows/deploy-beta.yml'
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to deploy (all, api-gateway, orchestrator, graphrag, compliance, proactive, ingestion)'
        required: false
        default: 'all'

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  REGISTRY: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/life-navigator

jobs:
  # ===========================================================================
  # Build and Push Container Images
  # ===========================================================================
  build:
    name: Build Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    strategy:
      matrix:
        service:
          - name: api-gateway
            dockerfile: apps/api-gateway/Dockerfile
            context: .
          - name: agent-orchestrator
            dockerfile: apps/agent-orchestrator/Dockerfile
            context: .
          - name: graphrag-api
            dockerfile: apps/graphrag-api/Dockerfile
            context: .
          - name: compliance-checker
            dockerfile: apps/compliance-checker/Dockerfile
            context: .
          - name: proactive-engine
            dockerfile: apps/proactive-engine/Dockerfile
            context: .
          - name: ingestion-worker
            dockerfile: apps/ingestion-worker/Dockerfile
            context: .

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Check if Dockerfile exists
        id: check_dockerfile
        run: |
          if [ -f "${{ matrix.service.dockerfile }}" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "::warning::Dockerfile not found: ${{ matrix.service.dockerfile }}"
          fi

      - name: Build and push image
        if: steps.check_dockerfile.outputs.exists == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ matrix.service.name }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ matrix.service.name }}:beta
            ${{ env.REGISTRY }}/${{ matrix.service.name }}:latest
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}
          build-args: |
            ENVIRONMENT=beta
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_SHA=${{ github.sha }}

  # ===========================================================================
  # Deploy Infrastructure with Terraform
  # ===========================================================================
  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      id-token: write

    defaults:
      run:
        working-directory: terraform/gcp/environments/beta

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan -out=tfplan -input=false

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

  # ===========================================================================
  # Deploy Cloud Run Services
  # ===========================================================================
  deploy-services:
    name: Deploy Services
    runs-on: ubuntu-latest
    needs: [build, terraform]
    permissions:
      contents: read
      id-token: write

    strategy:
      matrix:
        service:
          - name: ln-api-gateway
            image: api-gateway
          - name: ln-agent-orchestrator
            image: agent-orchestrator
          - name: ln-graphrag-api
            image: graphrag-api
          - name: ln-compliance-checker
            image: compliance-checker

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run services update ${{ matrix.service.name }} \
            --image=${{ env.REGISTRY }}/${{ matrix.service.image }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --quiet

  # ===========================================================================
  # Deploy Cloud Run Jobs
  # ===========================================================================
  deploy-jobs:
    name: Deploy Jobs
    runs-on: ubuntu-latest
    needs: [build, terraform]
    permissions:
      contents: read
      id-token: write

    strategy:
      matrix:
        job:
          - name: ln-proactive-scan
            image: proactive-engine
          - name: ln-ingestion-job
            image: ingestion-worker

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Update Cloud Run Job
        run: |
          gcloud run jobs update ${{ matrix.job.name }} \
            --image=${{ env.REGISTRY }}/${{ matrix.job.image }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --quiet

  # ===========================================================================
  # Post-Deployment Verification
  # ===========================================================================
  verify:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: [deploy-services, deploy-jobs]
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Get API Gateway URL
        id: api_url
        run: |
          URL=$(gcloud run services describe ln-api-gateway --region=${{ env.REGION }} --format='value(status.url)')
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Health Check
        run: |
          echo "Waiting for service to be ready..."
          sleep 30

          # Health check with retry
          for i in {1..5}; do
            if curl -sf "${{ steps.api_url.outputs.url }}/health" > /dev/null; then
              echo "✅ Health check passed!"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done

          echo "❌ Health check failed after 5 attempts"
          exit 1

      - name: Output Deployment Info
        run: |
          echo "============================================"
          echo "🚀 Beta Deployment Complete!"
          echo "============================================"
          echo ""
          echo "API Gateway: ${{ steps.api_url.outputs.url }}"
          echo "Git SHA: ${{ github.sha }}"
          echo "Deployed at: $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
          echo ""
          echo "Services deployed:"
          gcloud run services list --region=${{ env.REGION }} --format='table(name,url,status)'
          echo ""
          echo "Jobs deployed:"
          gcloud run jobs list --region=${{ env.REGION }} --format='table(name,status)'
