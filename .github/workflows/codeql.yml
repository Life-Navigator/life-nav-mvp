---
# CodeQL Advanced Security Scanning
# GitHub's semantic code analysis engine
# Detects vulnerabilities across JavaScript/TypeScript and Python

name: "CodeQL Advanced Security"

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Run every Monday at 6am UTC (weekly security scan)
    - cron: '0 6 * * 1'
  workflow_dispatch:

# Required permissions for CodeQL
permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 360

    strategy:
      fail-fast: false
      matrix:
        language: ['javascript-typescript', 'python']
        # CodeQL supports: 'c-cpp', 'csharp', 'go', 'java-kotlin', 'javascript-typescript', 'python', 'ruby', 'swift'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better analysis

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # Use extended queries for maximum security coverage
          queries: security-extended,security-and-quality
          # Custom queries (if we create them later)
          # config-file: ./.github/codeql/codeql-config.yml

      # Autobuild attempts to build compiled languages (C/C++, C#, Go, Java, Swift)
      # For Python and JavaScript, no build step is needed
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      # Manual build steps (if autobuild fails)
      # - name: Build Python
      #   if: matrix.language == 'python'
      #   run: |
      #     cd backend
      #     poetry install --no-interaction

      # - name: Build JavaScript/TypeScript
      #   if: matrix.language == 'javascript-typescript'
      #   run: |
      #     pnpm install --frozen-lockfile
      #     pnpm run build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
          # Upload results even if there are findings
          upload: true

      - name: Upload analysis results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codeql-results-${{ matrix.language }}
          path: |
            /home/runner/work/_temp/codeql_databases/
            *.sarif
          retention-days: 7

  summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: analyze
    if: always()

    steps:
      - name: Create summary
        run: |
          echo "## CodeQL Security Scan Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Scanned languages:" >> $GITHUB_STEP_SUMMARY
          echo "- JavaScript/TypeScript" >> $GITHUB_STEP_SUMMARY
          echo "- Python" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Results uploaded to Security → Code scanning → CodeQL" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:**" >> $GITHUB_STEP_SUMMARY
          echo "- JavaScript/TypeScript: ${{ needs.analyze.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Python: ${{ needs.analyze.result }}" >> $GITHUB_STEP_SUMMARY
