# ===========================================================================
# Pull Request Checks - Monorepo CI
# ===========================================================================
# Triggers: All pull requests to main/develop branches
# Purpose: Fast feedback on PRs with targeted checks based on changed files
# Strategy: Detect changes, run only relevant linters/tests for affected areas
# ===========================================================================

name: PR Checks

on:
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened]

# Concurrency: Cancel in-progress runs when new commits are pushed
concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20.x'
  PYTHON_VERSION: '3.11'
  RUST_VERSION: '1.75'
  PNPM_VERSION: '8'

jobs:
  # ===========================================================================
  # Detect Changed Files - Determine which parts of monorepo changed
  # ===========================================================================
  detect-changes:
    name: Detect Changed Files
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      graphrag: ${{ steps.filter.outputs.graphrag }}
      web: ${{ steps.filter.outputs.web }}
      mobile: ${{ steps.filter.outputs.mobile }}
      packages: ${{ steps.filter.outputs.packages }}
      infra: ${{ steps.filter.outputs.infra }}
      migrations: ${{ steps.filter.outputs.migrations }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Needed to compare with base branch

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/backend.yml'
              - '.github/workflows/pr-checks.yml'
            graphrag:
              - 'services/graphrag-rs/**'
              - '.github/workflows/graphrag.yml'
              - '.github/workflows/pr-checks.yml'
            web:
              - 'apps/web/**'
              - 'packages/**'
              - 'pnpm-lock.yaml'
              - 'turbo.json'
              - '.github/workflows/web.yml'
              - '.github/workflows/pr-checks.yml'
            mobile:
              - 'apps/mobile/**'
              - 'packages/**'
              - 'pnpm-lock.yaml'
              - 'turbo.json'
              - '.github/workflows/mobile.yml'
              - '.github/workflows/pr-checks.yml'
            packages:
              - 'packages/**'
              - 'pnpm-lock.yaml'
            infra:
              - 'k8s/**'
              - 'terraform/**'
              - 'infra/**'
              - 'docker-compose*.yml'
            migrations:
              - 'backend/app/db/migrations/**'
              - 'backend/alembic.ini'
              - 'migrations/**'

      - name: Display changes
        run: |
          echo "=== Changed Areas ==="
          echo "Backend: ${{ steps.filter.outputs.backend }}"
          echo "GraphRAG: ${{ steps.filter.outputs.graphrag }}"
          echo "Web: ${{ steps.filter.outputs.web }}"
          echo "Mobile: ${{ steps.filter.outputs.mobile }}"
          echo "Packages: ${{ steps.filter.outputs.packages }}"
          echo "Infrastructure: ${{ steps.filter.outputs.infra }}"
          echo "Migrations: ${{ steps.filter.outputs.migrations }}"

  # ===========================================================================
  # Backend Checks - FastAPI Python Service
  # ===========================================================================
  lint-backend:
    name: Backend - Lint & Type Check
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 1.7.1
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v4
        with:
          path: backend/.venv
          key: venv-${{ runner.os }}-${{ hashFiles('**/poetry.lock') }}

      - name: Install dependencies
        if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
        run: poetry install --no-interaction --no-root

      - name: Install project
        run: poetry install --no-interaction

      - name: Run Black (format check)
        run: poetry run black --check app/

      - name: Run Ruff (linting)
        run: poetry run ruff check app/

      - name: Run MyPy (type checking)
        run: poetry run mypy app/
        continue-on-error: true

  # ===========================================================================
  # GraphRAG Checks - Rust Service
  # ===========================================================================
  lint-graphrag:
    name: GraphRAG - Lint & Type Check
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.graphrag == 'true'
    defaults:
      run:
        working-directory: services/graphrag-rs

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt, clippy
          cache: true

      - name: Install Protocol Buffer Compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler libprotobuf-dev

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build check
        run: cargo check --all-features

  # ===========================================================================
  # Web App Checks - Next.js
  # ===========================================================================
  lint-web:
    name: Web - Lint & Type Check
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.web == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Run ESLint
        run: pnpm turbo run lint --filter=@life-navigator/web

      - name: Run TypeScript type check
        run: pnpm turbo run type-check --filter=@life-navigator/web

      - name: Check code formatting
        run: pnpm exec prettier --check "apps/web/**/*.{ts,tsx,js,jsx,json,css,md}"

  # ===========================================================================
  # Mobile App Checks - React Native
  # ===========================================================================
  lint-mobile:
    name: Mobile - Lint & Type Check
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.mobile == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-mobile-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-mobile-

      - name: Run ESLint
        run: pnpm turbo run lint --filter=@life-navigator/mobile

      - name: Run TypeScript type check
        run: pnpm turbo run type-check --filter=@life-navigator/mobile

      - name: Check code formatting
        run: pnpm exec prettier --check "apps/mobile/**/*.{ts,tsx,js,jsx,json}"

  # ===========================================================================
  # Shared Packages Checks
  # ===========================================================================
  lint-packages:
    name: Packages - Lint & Type Check
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.packages == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Run lint on all packages
        run: pnpm turbo run lint --filter='./packages/*'

      - name: Run type-check on all packages
        run: pnpm turbo run type-check --filter='./packages/*'

  # ===========================================================================
  # Migration Validation
  # ===========================================================================
  validate-migrations:
    name: Validate Database Migrations
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.migrations == 'true'
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 1.7.1
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v4
        with:
          path: backend/.venv
          key: venv-${{ runner.os }}-${{ hashFiles('**/poetry.lock') }}

      - name: Install dependencies
        if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
        run: poetry install --no-interaction --no-root --only main

      - name: Install project
        run: poetry install --no-interaction --only main

      - name: Validate migration syntax
        run: |
          echo "Checking migration files..."
          MIGRATION_FILES=$(find app/db/migrations/versions -name "*.py" 2>/dev/null || echo "")

          if [ -z "$MIGRATION_FILES" ]; then
            echo "No migration files found"
            exit 0
          fi

          for file in $MIGRATION_FILES; do
            echo "Validating: $file"
            python -m py_compile "$file" || exit 1
          done

          echo "✅ All migration files are valid"

      - name: Check for conflicts
        run: |
          if [ -f "alembic.ini" ]; then
            poetry run alembic check || {
              echo "❌ Migration conflict detected"
              echo "Please resolve migration conflicts before merging"
              exit 1
            }
          fi

  # ===========================================================================
  # Infrastructure Validation
  # ===========================================================================
  validate-infra:
    name: Validate Infrastructure
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.infra == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Kubernetes manifests
        run: |
          # Install kubeval for K8s validation
          curl -L https://github.com/instrumenta/kubeval/releases/latest/download/kubeval-linux-amd64.tar.gz | tar xz
          sudo mv kubeval /usr/local/bin/

          # Validate all K8s YAML files
          echo "Validating Kubernetes manifests..."
          find k8s -name "*.yaml" -o -name "*.yml" | while read file; do
            echo "Validating: $file"
            kubeval "$file" || echo "⚠️  Warning: $file validation failed"
          done

          echo "✅ Kubernetes validation complete"
        continue-on-error: true

      - name: Validate Docker Compose
        run: |
          # Validate docker-compose files
          if [ -f "docker-compose.yml" ]; then
            docker compose -f docker-compose.yml config > /dev/null || {
              echo "❌ docker-compose.yml is invalid"
              exit 1
            }
            echo "✅ docker-compose.yml is valid"
          fi

      - name: Check Terraform formatting
        if: hashFiles('terraform/**/*.tf') != ''
        run: |
          # Install Terraform
          wget -O- https://apt.releases.hashicorp.com/gpg | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list
          sudo apt-get update && sudo apt-get install -y terraform

          # Check Terraform formatting
          cd terraform
          terraform fmt -check -recursive || {
            echo "❌ Terraform files need formatting"
            echo "Run: terraform fmt -recursive"
            exit 1
          }

          echo "✅ Terraform formatting is correct"
        continue-on-error: true

  # ===========================================================================
  # PR Summary - Final Status Check
  # ===========================================================================
  pr-summary:
    name: PR Summary
    runs-on: ubuntu-latest
    needs: [detect-changes, lint-backend, lint-graphrag, lint-web, lint-mobile, lint-packages, validate-migrations, validate-infra]
    if: always()

    steps:
      - name: Check all job results
        run: |
          echo "=== PR Check Summary ==="
          echo ""
          echo "Changed areas:"
          echo "  Backend: ${{ needs.detect-changes.outputs.backend }}"
          echo "  GraphRAG: ${{ needs.detect-changes.outputs.graphrag }}"
          echo "  Web: ${{ needs.detect-changes.outputs.web }}"
          echo "  Mobile: ${{ needs.detect-changes.outputs.mobile }}"
          echo "  Packages: ${{ needs.detect-changes.outputs.packages }}"
          echo "  Infrastructure: ${{ needs.detect-changes.outputs.infra }}"
          echo "  Migrations: ${{ needs.detect-changes.outputs.migrations }}"
          echo ""
          echo "Job results:"
          echo "  Backend lint: ${{ needs.lint-backend.result }}"
          echo "  GraphRAG lint: ${{ needs.lint-graphrag.result }}"
          echo "  Web lint: ${{ needs.lint-web.result }}"
          echo "  Mobile lint: ${{ needs.lint-mobile.result }}"
          echo "  Packages lint: ${{ needs.lint-packages.result }}"
          echo "  Migrations validation: ${{ needs.validate-migrations.result }}"
          echo "  Infra validation: ${{ needs.validate-infra.result }}"
          echo ""

          # Check if any required job failed
          FAILED=false

          if [ "${{ needs.detect-changes.outputs.backend }}" == "true" ] && [ "${{ needs.lint-backend.result }}" == "failure" ]; then
            echo "❌ Backend checks failed"
            FAILED=true
          fi

          if [ "${{ needs.detect-changes.outputs.graphrag }}" == "true" ] && [ "${{ needs.lint-graphrag.result }}" == "failure" ]; then
            echo "❌ GraphRAG checks failed"
            FAILED=true
          fi

          if [ "${{ needs.detect-changes.outputs.web }}" == "true" ] && [ "${{ needs.lint-web.result }}" == "failure" ]; then
            echo "❌ Web checks failed"
            FAILED=true
          fi

          if [ "${{ needs.detect-changes.outputs.mobile }}" == "true" ] && [ "${{ needs.lint-mobile.result }}" == "failure" ]; then
            echo "❌ Mobile checks failed"
            FAILED=true
          fi

          if [ "${{ needs.detect-changes.outputs.packages }}" == "true" ] && [ "${{ needs.lint-packages.result }}" == "failure" ]; then
            echo "❌ Packages checks failed"
            FAILED=true
          fi

          if [ "${{ needs.detect-changes.outputs.migrations }}" == "true" ] && [ "${{ needs.validate-migrations.result }}" == "failure" ]; then
            echo "❌ Migration validation failed"
            FAILED=true
          fi

          if [ "$FAILED" == "true" ]; then
            echo ""
            echo "❌ Some checks failed. Please fix the issues before merging."
            exit 1
          fi

          echo ""
          echo "✅ All PR checks passed! Ready for review."

      - name: Add PR comment with results
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const summary = `## PR Check Results

            ### Changed Areas
            - Backend: ${{ needs.detect-changes.outputs.backend == 'true' && '✅' || '⬜' }}
            - GraphRAG: ${{ needs.detect-changes.outputs.graphrag == 'true' && '✅' || '⬜' }}
            - Web: ${{ needs.detect-changes.outputs.web == 'true' && '✅' || '⬜' }}
            - Mobile: ${{ needs.detect-changes.outputs.mobile == 'true' && '✅' || '⬜' }}
            - Packages: ${{ needs.detect-changes.outputs.packages == 'true' && '✅' || '⬜' }}
            - Infrastructure: ${{ needs.detect-changes.outputs.infra == 'true' && '✅' || '⬜' }}
            - Migrations: ${{ needs.detect-changes.outputs.migrations == 'true' && '✅' || '⬜' }}

            ### Check Results
            - Backend: ${{ needs.lint-backend.result == 'success' && '✅' || needs.lint-backend.result == 'skipped' && '⬜' || '❌' }}
            - GraphRAG: ${{ needs.lint-graphrag.result == 'success' && '✅' || needs.lint-graphrag.result == 'skipped' && '⬜' || '❌' }}
            - Web: ${{ needs.lint-web.result == 'success' && '✅' || needs.lint-web.result == 'skipped' && '⬜' || '❌' }}
            - Mobile: ${{ needs.lint-mobile.result == 'success' && '✅' || needs.lint-mobile.result == 'skipped' && '⬜' || '❌' }}
            - Packages: ${{ needs.lint-packages.result == 'success' && '✅' || needs.lint-packages.result == 'skipped' && '⬜' || '❌' }}
            - Migrations: ${{ needs.validate-migrations.result == 'success' && '✅' || needs.validate-migrations.result == 'skipped' && '⬜' || '❌' }}
            - Infrastructure: ${{ needs.validate-infra.result == 'success' && '✅' || needs.validate-infra.result == 'skipped' && '⬜' || '❌' }}

            ---
            *Automated PR checks for Life Navigator monorepo*
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });
