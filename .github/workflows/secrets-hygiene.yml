name: Secrets Hygiene

on:
  pull_request:
    branches: [main, staging, beta]
  push:
    branches: [main, staging, beta]
  workflow_dispatch:

jobs:
  check-no-env-files:
    name: Block .env files in production paths
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for .env files (except .env.example)
        run: |
          echo "🔍 Checking for forbidden .env files..."

          # Find all .env files except .env.example
          FORBIDDEN_FILES=$(find . -type f \
            \( -name ".env" -o -name ".env.*" \) \
            ! -name ".env.example" \
            ! -path "./node_modules/*" \
            ! -path "./.git/*" \
            ! -path "./.next/*" \
            ! -path "./dist/*" \
            ! -path "./.turbo/*" || true)

          if [ -n "$FORBIDDEN_FILES" ]; then
            echo "❌ ERROR: .env files found in repository:"
            echo "$FORBIDDEN_FILES"
            echo ""
            echo "These files must not be committed."
            echo "Production uses:"
            echo "  - GitHub Actions Secrets (CI/CD)"
            echo "  - Vercel Environment Variables (Frontend)"
            echo "  - GCP Secret Manager (Backend)"
            echo ""
            echo "For local development, use .env.local (gitignored)"
            exit 1
          fi

          echo "✅ No forbidden .env files found"

  check-openai-imports:
    name: Block OpenAI runtime imports
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for OpenAI imports in backend
        run: |
          echo "🔍 Checking for OpenAI imports in production code..."

          # Search for OpenAI imports (exclude test files and docs)
          OPENAI_IMPORTS=$(grep -r "from openai import\|import openai" backend/app/ 2>/dev/null | grep -v "__pycache__" || true)

          if [ -n "$OPENAI_IMPORTS" ]; then
            echo "❌ ERROR: OpenAI imports found in backend/app/:"
            echo "$OPENAI_IMPORTS"
            echo ""
            echo "OpenAI is not allowed in production runtime."
            echo "Use EMBEDDINGS_PROVIDER=graphrag instead."
            echo ""
            echo "See: docs/architecture/DEPENDENCY_REMOVAL_OPENAI.md"
            exit 1
          fi

          echo "✅ No OpenAI imports in production code"

      - name: Verify OpenAI not in production dependencies
        working-directory: backend
        run: |
          echo "🔍 Checking pyproject.toml for OpenAI in production dependencies..."

          # Check main dependencies section (not dev group)
          if grep -A 50 '^\[tool\.poetry\.dependencies\]' pyproject.toml | grep -v '^\[tool\.poetry\.group' | grep -q 'openai.*='; then
            echo "❌ ERROR: openai found in production dependencies"
            echo ""
            echo "OpenAI must be in [tool.poetry.group.dev.dependencies] only, or removed entirely."
            echo ""
            echo "Move to dev dependencies:"
            echo "  poetry remove openai"
            echo "  poetry add --group dev openai"
            echo ""
            echo "See: docs/architecture/DEPENDENCY_REMOVAL_OPENAI.md"
            exit 1
          fi

          echo "✅ OpenAI not in production dependencies"

  check-secret-entropy:
    name: Detect high-entropy strings (potential secrets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install detect-secrets
        run: pip install detect-secrets

      - name: Run detect-secrets
        run: |
          # Initialize baseline if it doesn't exist
          if [ ! -f .secrets.baseline ]; then
            detect-secrets scan --baseline .secrets.baseline
          fi

          # Scan for new secrets
          detect-secrets scan --baseline .secrets.baseline

  validate-env-examples:
    name: Validate .env.example files have no real values
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check .env.example files
        run: |
          echo "🔍 Validating .env.example files..."

          # Patterns that indicate real secrets (not examples)
          FORBIDDEN_PATTERNS=(
            "sk_live_"       # Stripe live keys
            "pk_live_"       # Stripe live publishable keys
            "rk_live_"       # Resend live keys
            "sk_prod_"       # Any production secret key
            "prod.*secret"   # Production secrets
            "eyJ[A-Za-z0-9-_=]+\.[A-Za-z0-9-_=]+\.[A-Za-z0-9-_.+/=]*"  # JWTs
          )

          FOUND_ISSUES=0

          for example_file in $(find . -name ".env.example"); do
            echo "Checking $example_file"

            for pattern in "${FORBIDDEN_PATTERNS[@]}"; do
              if grep -qE "$pattern" "$example_file"; then
                echo "❌ ERROR: Real secret pattern found in $example_file"
                echo "   Pattern: $pattern"
                FOUND_ISSUES=1
              fi
            done
          done

          if [ $FOUND_ISSUES -eq 1 ]; then
            echo ""
            echo ".env.example files must contain only placeholder values"
            echo "Use: STRIPE_API_KEY=sk_test_... or STRIPE_API_KEY=your_key_here"
            exit 1
          fi

          echo "✅ All .env.example files use placeholder values"

  check-config-production:
    name: Verify production config enforces security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install poetry
          poetry install --no-root

      - name: Test production config validation
        working-directory: backend
        run: |
          echo "🔍 Testing production config validation..."

          # Test that production config fails with insecure defaults
          export ENVIRONMENT=production
          export SECRET_KEY=INSECURE-CHANGE-IN-PRODUCTION

          # This should FAIL and prevent startup
          poetry run python -c "from app.core.config import get_settings; get_settings()" 2>&1 | grep -q "CONFIGURATION ERROR" && echo "✅ Config validation works" || (echo "❌ Config validation FAILED - insecure defaults allowed!"; exit 1)

          echo "✅ Production config properly rejects insecure defaults"
