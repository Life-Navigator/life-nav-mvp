# ===========================================================================
# Backend Services CI/CD Pipeline - Cloud Run Deployment
# ===========================================================================
# Deploys backend services to Cloud Run with Workload Identity Federation
# ===========================================================================

name: Backend Services CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'services/agents/**'
      - 'services/graphrag-rs/**'
      - '.github/workflows/backend-cloudrun.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - 'services/agents/**'
      - 'services/graphrag-rs/**'
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to deploy'
        required: true
        type: choice
        options:
          - all
          - api-gateway
          - agent-orchestrator
          - graphrag-api
      environment:
        description: 'Deployment environment'
        required: true
        default: 'beta'
        type: choice
        options:
          - beta

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  REPOSITORY: life-navigator

# Required for Workload Identity Federation
permissions:
  contents: read
  id-token: write

jobs:
  # ===========================================================================
  # Detect Changed Services
  # ===========================================================================
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      api-gateway: ${{ steps.filter.outputs.api-gateway }}
      agent-orchestrator: ${{ steps.filter.outputs.agent-orchestrator }}
      graphrag-api: ${{ steps.filter.outputs.graphrag-api }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api-gateway:
              - 'backend/**'
            agent-orchestrator:
              - 'services/agents/**'
            graphrag-api:
              - 'services/graphrag-rs/**'

  # ===========================================================================
  # API Gateway (FastAPI Backend)
  # ===========================================================================
  api-gateway:
    name: API Gateway
    runs-on: ubuntu-latest
    needs: changes
    if: |
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.service == 'all' || github.event.inputs.service == 'api-gateway')) ||
      (github.event_name == 'push' && needs.changes.outputs.api-gateway == 'true')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 1.7.1

      - name: Install dependencies and lint
        working-directory: backend
        run: |
          poetry install --no-interaction
          poetry run ruff check app/ || echo "Linting warnings (non-blocking)"
        continue-on-error: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/api-gateway:beta
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/api-gateway:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Delete existing service (clean slate)
        if: github.event_name != 'pull_request'
        run: |
          gcloud run services delete ln-api-gateway \
            --region ${{ env.REGION }} \
            --quiet || echo "Service does not exist, proceeding with fresh deploy"

      - name: Deploy to Cloud Run
        if: github.event_name != 'pull_request'
        run: |
          gcloud run deploy ln-api-gateway \
            --image ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/api-gateway:beta \
            --region ${{ env.REGION }} \
            --platform managed \
            --port 8000 \
            --cpu 1 \
            --memory 512Mi \
            --min-instances 0 \
            --max-instances 5 \
            --timeout 300s \
            --concurrency 80 \
            --service-account "ln-api-gateway-beta@${{ env.PROJECT_ID }}.iam.gserviceaccount.com" \
            --set-env-vars "ENVIRONMENT=beta,LOG_LEVEL=INFO,CORS_ORIGINS=https://ln-web-frontend-qcws22vbba-uc.a.run.app,OTEL_TRACES_ENABLED=false,OTEL_METRICS_ENABLED=false" \
            --set-secrets "DATABASE_URL=database-url-beta:latest" \
            --vpc-connector "ln-vpc-connector-beta" \
            --vpc-egress private-ranges-only \
            --allow-unauthenticated

      - name: Get service URL
        if: github.event_name != 'pull_request'
        run: |
          URL=$(gcloud run services describe ln-api-gateway --region ${{ env.REGION }} --format 'value(status.url)')
          echo "API Gateway deployed to: $URL"

  # ===========================================================================
  # Agent Orchestrator (Python ML Service)
  # ===========================================================================
  agent-orchestrator:
    name: Agent Orchestrator
    runs-on: ubuntu-latest
    needs: changes
    if: |
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.service == 'all' || github.event.inputs.service == 'agent-orchestrator')) ||
      (github.event_name == 'push' && needs.changes.outputs.agent-orchestrator == 'true')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./services/agents
          file: ./services/agents/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/agent-orchestrator:beta
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/agent-orchestrator:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Delete existing service (clean slate)
        if: github.event_name != 'pull_request'
        run: |
          gcloud run services delete ln-agent-orchestrator \
            --region ${{ env.REGION }} \
            --quiet || echo "Service does not exist, proceeding with fresh deploy"

      - name: Deploy to Cloud Run
        if: github.event_name != 'pull_request'
        run: |
          gcloud run deploy ln-agent-orchestrator \
            --image ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/agent-orchestrator:beta \
            --region ${{ env.REGION }} \
            --platform managed \
            --port 8080 \
            --cpu 2 \
            --memory 2Gi \
            --min-instances 0 \
            --max-instances 3 \
            --timeout 600s \
            --concurrency 20 \
            --service-account "ln-orchestrator-beta@${{ env.PROJECT_ID }}.iam.gserviceaccount.com" \
            --set-env-vars "ENVIRONMENT=beta,LOG_LEVEL=INFO" \
            --set-secrets "DATABASE_URL=database-url-beta:latest" \
            --vpc-connector "ln-vpc-connector-beta" \
            --vpc-egress private-ranges-only \
            --allow-unauthenticated
        continue-on-error: true

      - name: Get service URL
        if: github.event_name != 'pull_request'
        run: |
          URL=$(gcloud run services describe ln-agent-orchestrator --region ${{ env.REGION }} --format 'value(status.url)') || echo "Service not yet available"
          echo "Agent Orchestrator: $URL"

  # ===========================================================================
  # GraphRAG API (Rust gRPC Service)
  # ===========================================================================
  graphrag-api:
    name: GraphRAG API
    runs-on: ubuntu-latest
    needs: changes
    if: |
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.service == 'all' || github.event.inputs.service == 'graphrag-api')) ||
      (github.event_name == 'push' && needs.changes.outputs.graphrag-api == 'true')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./services/graphrag-rs
          file: ./services/graphrag-rs/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/graphrag-api:beta
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/graphrag-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
        timeout-minutes: 30  # Rust builds take longer

      # NOTE: GraphRAG deployment is disabled until we have Neo4j and Qdrant infrastructure
      # The service requires these backends to start
      - name: Skip deployment (no backends yet)
        if: github.event_name != 'pull_request'
        run: |
          echo "⚠️ GraphRAG API deployment skipped - requires Neo4j and Qdrant infrastructure"
          echo "To deploy GraphRAG, first set up:"
          echo "  - Neo4j database"
          echo "  - Qdrant vector database"
          echo "  - GraphDB (optional)"
          echo "Then update this workflow to enable deployment"

      - name: Get service URL
        if: false  # Disabled - service not deployed
        run: |
          URL=$(gcloud run services describe ln-graphrag-api --region ${{ env.REGION }} --format 'value(status.url)') || echo "Service not yet available"
          echo "GraphRAG API: $URL"

  # ===========================================================================
  # Summary
  # ===========================================================================
  summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [api-gateway, agent-orchestrator, graphrag-api]
    if: always() && github.event_name != 'pull_request'

    steps:
      - name: Summary
        run: |
          echo "## Backend Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| API Gateway | ${{ needs.api-gateway.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Agent Orchestrator | ${{ needs.agent-orchestrator.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| GraphRAG API | ${{ needs.graphrag-api.result }} |" >> $GITHUB_STEP_SUMMARY
