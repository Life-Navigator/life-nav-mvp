# ===========================================================================
# Next.js Web App CI/CD Pipeline
# ===========================================================================
# Triggers: Push to main/develop, PRs affecting web app or shared packages
# Steps: Lint, type-check, test, build, push to GCR, deploy to GKE
# Uses: Turborepo for monorepo orchestration, pnpm for package management
# ===========================================================================

name: Web App CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/web/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - 'turbo.json'
      - '.github/workflows/web.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'apps/web/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - 'turbo.json'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCR_REGISTRY: gcr.io
  IMAGE_NAME: life-navigator-web
  GKE_CLUSTER: life-navigator-cluster
  GKE_ZONE: us-central1
  NODE_VERSION: '20.x'
  PNPM_VERSION: '8'

jobs:
  # ===========================================================================
  # Lint - ESLint and Code Quality Checks
  # ===========================================================================
  lint:
    name: Lint & Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Needed for turbo to detect changes

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Run ESLint
        run: pnpm turbo run lint --filter=@life-navigator/web

      - name: Check code formatting (Prettier)
        run: pnpm exec prettier --check "apps/web/**/*.{ts,tsx,js,jsx,json,css,md}"

  # ===========================================================================
  # Type Check - TypeScript Type Checking
  # ===========================================================================
  type-check:
    name: Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Run TypeScript type check
        run: pnpm turbo run type-check --filter=@life-navigator/web

  # ===========================================================================
  # Test - Unit and Integration Tests
  # ===========================================================================
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [lint, type-check]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Run tests
        run: |
          # Check if test script exists
          if pnpm --filter=@life-navigator/web run test --help 2>/dev/null; then
            pnpm turbo run test --filter=@life-navigator/web
          else
            echo "No tests found for web app, skipping..."
          fi
        continue-on-error: true

      - name: Upload test coverage
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: ./apps/web/coverage/coverage-final.json
          flags: web
          name: web-coverage
        continue-on-error: true

  # ===========================================================================
  # Build - Next.js Production Build
  # ===========================================================================
  build-app:
    name: Build Next.js App
    runs-on: ubuntu-latest
    needs: [lint, type-check]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: |
            apps/web/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('apps/web/**/*.ts', 'apps/web/**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-

      - name: Build web app with Turbo
        run: pnpm turbo run build --filter=@life-navigator/web
        env:
          NEXT_TELEMETRY_DISABLED: 1
          # Add environment-specific API URLs
          NEXT_PUBLIC_API_URL: ${{ secrets.DEV_API_URL || 'http://localhost:8000' }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: |
            apps/web/.next/
            apps/web/public/
          retention-days: 1

  # ===========================================================================
  # Build & Push Docker Image
  # ===========================================================================
  build-image:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [test, build-app]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.GCR_REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Determine environment for build
        id: build-env
        run: |
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "ENV_NAME=production" >> $GITHUB_OUTPUT
            echo "API_URL=${{ secrets.PROD_API_URL }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" == "refs/heads/develop" ]; then
            echo "ENV_NAME=staging" >> $GITHUB_OUTPUT
            echo "API_URL=${{ secrets.STAGING_API_URL }}" >> $GITHUB_OUTPUT
          else
            echo "ENV_NAME=development" >> $GITHUB_OUTPUT
            echo "API_URL=${{ secrets.DEV_API_URL }}" >> $GITHUB_OUTPUT
          fi

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          build-args: |
            NODE_VERSION=${{ env.NODE_VERSION }}
            NEXT_PUBLIC_API_URL=${{ steps.build-env.outputs.API_URL }}
            NODE_ENV=${{ steps.build-env.outputs.ENV_NAME }}

      - name: Output image details
        run: |
          echo "Image Tags: ${{ steps.meta.outputs.tags }}"
          echo "Image Digest: ${{ steps.build.outputs.digest }}"

  # ===========================================================================
  # Deploy to GKE
  # ===========================================================================
  deploy:
    name: Deploy to GKE
    runs-on: ubuntu-latest
    needs: build-image
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine environment
        id: env
        run: |
          if [ "${{ github.event.inputs.environment }}" != "" ]; then
            echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "environment=prod" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" == "refs/heads/develop" ]; then
            echo "environment=staging" >> $GITHUB_OUTPUT
          else
            echo "environment=dev" >> $GITHUB_OUTPUT
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Install gke-gcloud-auth-plugin
        run: |
          gcloud components install gke-gcloud-auth-plugin

      - name: Get GKE credentials
        run: |
          gcloud container clusters get-credentials ${{ env.GKE_CLUSTER }}-${{ steps.env.outputs.environment }} \
            --zone ${{ env.GKE_ZONE }} \
            --project ${{ env.PROJECT_ID }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.28.0'

      - name: Install Kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: Verify Kustomize overlay exists
        run: |
          if [ ! -d "k8s/overlays/${{ steps.env.outputs.environment }}" ]; then
            echo "Creating overlay directory for ${{ steps.env.outputs.environment }}"
            mkdir -p k8s/overlays/${{ steps.env.outputs.environment }}
          fi

      - name: Update image in Kustomize
        run: |
          cd k8s/overlays/${{ steps.env.outputs.environment }}

          # Extract the first tag from the image tags output
          IMAGE_TAG=$(echo "${{ needs.build-image.outputs.image-tag }}" | cut -d' ' -f1)

          kustomize edit set image web-image=${IMAGE_TAG}

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -k k8s/overlays/${{ steps.env.outputs.environment }}

      - name: Wait for rollout to complete
        run: |
          kubectl rollout status deployment/web-${{ steps.env.outputs.environment }} \
            -n life-navigator \
            --timeout=10m

      - name: Verify deployment
        run: |
          echo "=== Deployment Status ==="
          kubectl get deployment -n life-navigator -l app=web,env=${{ steps.env.outputs.environment }}

          echo ""
          echo "=== Pods Status ==="
          kubectl get pods -n life-navigator -l app=web,env=${{ steps.env.outputs.environment }}

          echo ""
          echo "=== Services ==="
          kubectl get svc -n life-navigator -l app=web

          echo ""
          echo "=== Ingress ==="
          kubectl get ingress -n life-navigator

      - name: Run smoke tests
        run: |
          # Get the ingress IP
          INGRESS_IP=$(kubectl get ingress -n life-navigator life-navigator-ingress-${{ steps.env.outputs.environment }} -o jsonpath='{.status.loadBalancer.ingress[0].ip}')

          if [ -z "$INGRESS_IP" ]; then
            echo "Warning: Ingress IP not found, using service IP"
            INGRESS_IP=$(kubectl get svc -n life-navigator web-${{ steps.env.outputs.environment }} -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          fi

          echo "Testing deployment at IP: $INGRESS_IP"

          # Wait for service to be ready
          sleep 30

          # Test health endpoint (adjust based on your app)
          curl -f -s -o /dev/null -w "%{http_code}" http://${INGRESS_IP}/ | grep -E "200|301|302" || {
            echo "Health check failed"
            exit 1
          }

          echo "✅ Smoke tests passed"

      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Deployment to ${{ steps.env.outputs.environment }} completed successfully"
          else
            echo "❌ Deployment to ${{ steps.env.outputs.environment }} failed"
          fi
          echo "Image: ${{ needs.build-image.outputs.image-tag }}"
          echo "Digest: ${{ needs.build-image.outputs.image-digest }}"
          echo "Environment: ${{ steps.env.outputs.environment }}"

  # ===========================================================================
  # Lighthouse Performance Audit (Optional, runs on main branch only)
  # ===========================================================================
  lighthouse:
    name: Lighthouse Performance Audit
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v10
        with:
          urls: |
            https://app.life-navigator.com
          uploadArtifacts: true
          temporaryPublicStorage: true
        continue-on-error: true
