---
# ===========================================================================
# Release Gate - Pre-Production Hardening Enforcement
# ===========================================================================
# This workflow enforces all deployment boundaries and quality gates
# before any code can be merged or deployed to production.
#
# ALL checks must pass - no exceptions.
# ===========================================================================

name: Release Gate

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress runs for same PR
concurrency:
  group: release-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================================================
  # Gate 1: Lint - Code Quality
  # ===========================================================================
  lint:
    name: "Gate 1: Lint"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: '8'

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint TypeScript/JavaScript (ESLint)
        run: pnpm turbo lint

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Lint Python (Ruff)
        run: |
          cd backend
          poetry install --no-interaction
          poetry run ruff check .

      - name: Lint Rust (Clippy)
        if: github.event_name == 'pull_request' && contains(github.event.pull_request.changed_files, 'services/graphrag-rs/')
        run: |
          cd services/graphrag-rs
          cargo clippy -- -D warnings

  # ===========================================================================
  # Gate 2: Type Checking
  # ===========================================================================
  type-check:
    name: "Gate 2: Type Check"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: '8'

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @life-navigator/web exec prisma generate

      - name: TypeScript type check
        run: pnpm turbo type-check

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Python type check (mypy)
        run: |
          cd backend
          poetry install --no-interaction
          poetry run mypy app --ignore-missing-imports

  # ===========================================================================
  # Gate 3: Unit Tests
  # ===========================================================================
  unit-tests:
    name: "Gate 3: Unit Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: '8'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @life-navigator/web exec prisma generate

      - name: Run unit tests
        run: pnpm turbo test:unit

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Run Python unit tests
        run: |
          cd backend
          poetry install --no-interaction
          poetry run pytest tests/unit --cov=app --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./backend/coverage.xml
          flags: backend

  # ===========================================================================
  # Gate 4: Contract Tests
  # ===========================================================================
  contract-tests:
    name: "Gate 4: Contract Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Run API contract tests
        run: |
          cd backend
          poetry install --no-interaction
          poetry run pytest tests/contract -v

      - name: Run market-data schema contract tests
        run: |
          cd services/market-data
          pip install -e ".[dev]"
          pytest tests/test_schema_contract.py -v

      - name: Run risk-engine contract tests
        run: |
          cd services/risk-engine
          poetry install --no-interaction
          poetry run pytest tests/test_stream_contract.py -v

  # ===========================================================================
  # Gate 5: Security Scans
  # ===========================================================================
  security-scan:
    name: "Gate 5: Security Scan"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner (filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: '8'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pnpm audit
        run: pnpm audit --audit-level=high

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Run Poetry security check
        run: |
          cd backend
          poetry install --no-interaction
          poetry check

      - name: Scan for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

  # ===========================================================================
  # Gate 6: Secret Detection
  # ===========================================================================
  secret-detection:
    name: "Gate 6: Secret Detection"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install detect-secrets
        run: pip install detect-secrets

      - name: Run detect-secrets scan
        run: |
          detect-secrets scan --baseline .secrets.baseline
          if [ $? -ne 0 ]; then
            echo "❌ New secrets detected! Run 'detect-secrets scan --update .secrets.baseline' to update."
            exit 1
          fi

      - name: Audit secrets baseline
        run: detect-secrets audit .secrets.baseline

  # ===========================================================================
  # Gate 7: Database Migration Check
  # ===========================================================================
  migration-check:
    name: "Gate 7: Migration Check"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: '8'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check Prisma migrations
        run: |
          cd apps/web
          pnpm exec prisma migrate diff \
            --from-schema-datamodel prisma/schema.prisma \
            --to-schema-datamodel prisma/schema.prisma \
            --script > migration-diff.sql

          if [ -s migration-diff.sql ]; then
            echo "⚠️  Database schema changes detected. Ensure migrations are created."
            cat migration-diff.sql
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Check Alembic migrations (backend)
        run: |
          cd backend
          poetry install --no-interaction

          # Generate SQL for migration dry-run
          poetry run alembic upgrade head --sql > migration-preview.sql

          echo "📋 Migration preview:"
          cat migration-preview.sql

      - name: Check Alembic migrations (services/api)
        if: contains(github.event.pull_request.changed_files, 'services/api/')
        run: |
          cd services/api
          poetry install --no-interaction
          poetry run alembic upgrade head --sql > migration-preview.sql
          cat migration-preview.sql

  # ===========================================================================
  # Gate 8: Container Scan (if Dockerfiles changed)
  # ===========================================================================
  container-scan:
    name: "Gate 8: Container Scan"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'pull_request' && (contains(github.event.pull_request.changed_files, 'Dockerfile') || contains(github.event.pull_request.changed_files, 'docker/'))
    strategy:
      matrix:
        service:
          - name: web
            context: apps/web
            dockerfile: apps/web/Dockerfile
          - name: backend
            context: backend
            dockerfile: backend/Dockerfile
          - name: risk-engine
            context: services/risk-engine
            dockerfile: services/risk-engine/Dockerfile
          - name: market-data
            context: services/market-data
            dockerfile: services/market-data/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            -f ${{ matrix.service.dockerfile }} \
            -t ${{ matrix.service.name }}:test \
            ${{ matrix.service.context }}

      - name: Run Trivy container scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ matrix.service.name }}:test'
          format: 'sarif'
          output: 'trivy-${{ matrix.service.name }}.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Upload scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-${{ matrix.service.name }}.sarif'

  # ===========================================================================
  # Summary: All Gates Passed
  # ===========================================================================
  release-gate-summary:
    name: "✅ Release Gate Summary"
    runs-on: ubuntu-latest
    needs:
      - lint
      - type-check
      - unit-tests
      - contract-tests
      - security-scan
      - secret-detection
      - migration-check
    if: always()
    steps:
      - name: Check all gates passed
        run: |
          echo "## 🚀 Release Gate Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ needs.lint.result }}" == "success" ]]; then
            echo "✅ Gate 1: Lint - PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Gate 1: Lint - FAILED" >> $GITHUB_STEP_SUMMARY
          fi

          if [[ "${{ needs.type-check.result }}" == "success" ]]; then
            echo "✅ Gate 2: Type Check - PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Gate 2: Type Check - FAILED" >> $GITHUB_STEP_SUMMARY
          fi

          if [[ "${{ needs.unit-tests.result }}" == "success" ]]; then
            echo "✅ Gate 3: Unit Tests - PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Gate 3: Unit Tests - FAILED" >> $GITHUB_STEP_SUMMARY
          fi

          if [[ "${{ needs.contract-tests.result }}" == "success" ]]; then
            echo "✅ Gate 4: Contract Tests - PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Gate 4: Contract Tests - FAILED" >> $GITHUB_STEP_SUMMARY
          fi

          if [[ "${{ needs.security-scan.result }}" == "success" ]]; then
            echo "✅ Gate 5: Security Scan - PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Gate 5: Security Scan - FAILED" >> $GITHUB_STEP_SUMMARY
          fi

          if [[ "${{ needs.secret-detection.result }}" == "success" ]]; then
            echo "✅ Gate 6: Secret Detection - PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Gate 6: Secret Detection - FAILED" >> $GITHUB_STEP_SUMMARY
          fi

          if [[ "${{ needs.migration-check.result }}" == "success" || "${{ needs.migration-check.result }}" == "skipped" ]]; then
            echo "✅ Gate 7: Migration Check - PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Gate 7: Migration Check - FAILED" >> $GITHUB_STEP_SUMMARY
          fi

          # Check if all required gates passed
          if [[ "${{ needs.lint.result }}" == "success" && \
                "${{ needs.type-check.result }}" == "success" && \
                "${{ needs.unit-tests.result }}" == "success" && \
                "${{ needs.contract-tests.result }}" == "success" && \
                "${{ needs.security-scan.result }}" == "success" && \
                "${{ needs.secret-detection.result }}" == "success" ]]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "## ✅ ALL GATES PASSED - Ready for deployment" >> $GITHUB_STEP_SUMMARY
            exit 0
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "## ❌ RELEASE GATE FAILED - Cannot deploy" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
