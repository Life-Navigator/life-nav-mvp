version: 2

updates:
  # Root package (turbo, prettier, etc.)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      dev-dependencies:
        dependency-type: development
        update-types: [minor, patch]
      production-dependencies:
        dependency-type: production
        update-types: [patch]
    labels:
      - dependencies
      - automated

  # Web app
  - package-ecosystem: npm
    directory: /apps/web
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      next-ecosystem:
        patterns: ['next', 'next-*', '@next/*', 'eslint-config-next']
      react-ecosystem:
        patterns: ['react', 'react-dom', '@types/react', '@types/react-dom']
      supabase:
        patterns: ['@supabase/*']
      testing:
        patterns: ['jest', '@jest/*', '@testing-library/*', '@playwright/*', 'playwright']
        dependency-type: development
      tailwind:
        patterns: ['tailwindcss', '@tailwindcss/*', 'postcss', 'autoprefixer']
      minor-and-patch:
        update-types: [minor, patch]
        exclude-patterns: ['next', 'next-*', 'react', 'react-dom', '@supabase/*']
    labels:
      - dependencies
      - automated

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
      - automated
