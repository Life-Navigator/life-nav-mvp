---
# ClusterSecretStore for GCP Secret Manager
# This is created by Terraform in the External Secrets Operator module
# This file is for reference and documentation
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: gcpsm-secret-store
  labels:
    app.kubernetes.io/name: life-navigator
    app.kubernetes.io/component: secret-store
spec:
  provider:
    gcpsm:
      projectID: "PROJECT_ID"
      auth:
        workloadIdentity:
          clusterLocation: us-central1
          clusterName: life-navigator-gke
          serviceAccountRef:
            name: external-secrets-sa
            namespace: external-secrets-system
---
# ExternalSecret for Backend Database Credentials
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: backend-secrets
  labels:
    app: backend
    component: api-server
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcpsm-secret-store
    kind: ClusterSecretStore
  target:
    name: backend-secrets
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # Database URL constructed from secret
        database-url: "{{ .database_url }}"
        # Redis URL
        redis-url: "{{ .redis_url }}"
        # JWT Secret
        jwt-secret-key: "{{ .jwt_secret }}"
        # Neo4j
        neo4j-uri: "{{ .neo4j_uri }}"
        neo4j-password: "{{ .neo4j_password }}"
        # Qdrant
        qdrant-api-key: "{{ .qdrant_api_key | default \"\" }}"
        # Sentry (Observability)
        sentry-dsn: "{{ .sentry_dsn }}"
        # AI API Keys
        openai-api-key: "{{ .openai_api_key }}"
        anthropic-api-key: "{{ .anthropic_api_key }}"
        # Plaid (Finance)
        plaid-client-id: "{{ .plaid_client_id | default \"\" }}"
        plaid-secret: "{{ .plaid_secret | default \"\" }}"
        # Stripe (Payments)
        stripe-api-key: "{{ .stripe_api_key | default \"\" }}"
        stripe-webhook-secret: "{{ .stripe_webhook_secret | default \"\" }}"
        # SendGrid (Email)
        sendgrid-api-key: "{{ .sendgrid_api_key | default \"\" }}"
        # Twilio (SMS)
        twilio-account-sid: "{{ .twilio_account_sid | default \"\" }}"
        twilio-auth-token: "{{ .twilio_auth_token | default \"\" }}"
        # OAuth Providers
        google-client-id: "{{ .google_client_id | default \"\" }}"
        google-client-secret: "{{ .google_client_secret | default \"\" }}"
        microsoft-client-id: "{{ .microsoft_client_id | default \"\" }}"
        microsoft-client-secret: "{{ .microsoft_client_secret | default \"\" }}"
  data:
  # Database URL (full connection string)
  - secretKey: database_url
    remoteRef:
      key: backend-database-url
  # Redis URL (full connection string)
  - secretKey: redis_url
    remoteRef:
      key: backend-redis-url
  # JWT Secret
  - secretKey: jwt_secret
    remoteRef:
      key: backend-jwt-secret-key
  # Neo4j
  - secretKey: neo4j_uri
    remoteRef:
      key: backend-neo4j-uri
  - secretKey: neo4j_password
    remoteRef:
      key: backend-neo4j-password
  # Qdrant (optional)
  - secretKey: qdrant_api_key
    remoteRef:
      key: backend-qdrant-api-key
  # Sentry
  - secretKey: sentry_dsn
    remoteRef:
      key: backend-sentry-dsn
  # AI API Keys
  - secretKey: openai_api_key
    remoteRef:
      key: backend-openai-api-key
  - secretKey: anthropic_api_key
    remoteRef:
      key: backend-anthropic-api-key
  # Plaid (optional)
  - secretKey: plaid_client_id
    remoteRef:
      key: backend-plaid-client-id
  - secretKey: plaid_secret
    remoteRef:
      key: backend-plaid-secret
  # Stripe (optional)
  - secretKey: stripe_api_key
    remoteRef:
      key: backend-stripe-api-key
  - secretKey: stripe_webhook_secret
    remoteRef:
      key: backend-stripe-webhook-secret
  # SendGrid (optional)
  - secretKey: sendgrid_api_key
    remoteRef:
      key: backend-sendgrid-api-key
  # Twilio (optional)
  - secretKey: twilio_account_sid
    remoteRef:
      key: backend-twilio-account-sid
  - secretKey: twilio_auth_token
    remoteRef:
      key: backend-twilio-auth-token
  # OAuth Providers (optional)
  - secretKey: google_client_id
    remoteRef:
      key: backend-google-client-id
  - secretKey: google_client_secret
    remoteRef:
      key: backend-google-client-secret
  - secretKey: microsoft_client_id
    remoteRef:
      key: backend-microsoft-client-id
  - secretKey: microsoft_client_secret
    remoteRef:
      key: backend-microsoft-client-secret
---
# ExternalSecret for Maverick API Key
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: maverick-secrets
  labels:
    app: maverick
    component: llm-service
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcpsm-secret-store
    kind: ClusterSecretStore
  target:
    name: maverick-secrets
    creationPolicy: Owner
  data:
  - secretKey: api-key
    remoteRef:
      key: maverick-api-key
---
# ExternalSecret for GraphRAG Service
# Note: GraphRAG service is deployed via Terraform and manages its own secrets
# This is a reference for any additional secrets needed
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: graphrag-additional-secrets
  namespace: services
  labels:
    app: graphrag
    component: rag-service
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcpsm-secret-store
    kind: ClusterSecretStore
  target:
    name: graphrag-additional-secrets
    creationPolicy: Owner
  data:
  - secretKey: embeddings-api-key
    remoteRef:
      key: embeddings-service-api-key
      property: value
      decodingStrategy: None
