---
# ClusterSecretStore for GCP Secret Manager
# This is created by Terraform in the External Secrets Operator module
# This file is for reference and documentation
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: gcpsm-secret-store
  labels:
    app.kubernetes.io/name: life-navigator
    app.kubernetes.io/component: secret-store
spec:
  provider:
    gcpsm:
      projectID: "lifenav-prod"
      auth:
        workloadIdentity:
          clusterLocation: us-central1
          clusterName: life-navigator-gke
          serviceAccountRef:
            name: external-secrets-sa
            namespace: external-secrets-system
---
# ExternalSecret for Backend Database Credentials
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: backend-secrets
  labels:
    app: backend
    component: api-server
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcpsm-secret-store
    kind: ClusterSecretStore
  target:
    name: backend-secrets
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # Database URLs
        DATABASE_URL: "{{ .database_url }}"
        DATABASE_FINANCIAL_URL: "{{ .database_financial_url }}"

        # Supabase
        SUPABASE_URL: "{{ .supabase_url }}"
        SUPABASE_KEY: "{{ .supabase_key }}"
        SUPABASE_SERVICE_KEY: "{{ .supabase_service_key }}"

        # Redis URL
        REDIS_URL: "{{ .redis_url }}"

        # Security
        SECRET_KEY: "{{ .jwt_secret }}"
        ENCRYPTION_KEY: "{{ .encryption_key }}"

        # Sentry (Observability)
        SENTRY_DSN: "{{ .sentry_dsn }}"

        # Other services
        OPENAI_API_KEY: "{{ .openai_api_key }}"
        PLAID_CLIENT_ID: "{{ .plaid_client_id | default \"\" }}"
        PLAID_SECRET: "{{ .plaid_secret | default \"\" }}"
        STRIPE_API_KEY: "{{ .stripe_api_key | default \"\" }}"
        RESEND_API_KEY: "{{ .resend_api_key | default \"\" }}"

  data:
  # Database
  - secretKey: database_url
    remoteRef:
      key: life-navigator-hipaa-db-url
  - secretKey: database_financial_url
    remoteRef:
      key: life-navigator-financial-db-url

  # Supabase
  - secretKey: supabase_url
    remoteRef:
      key: life-navigator-supabase-url
  - secretKey: supabase_key
    remoteRef:
      key: life-navigator-supabase-key
  - secretKey: supabase_service_key
    remoteRef:
      key: life-navigator-supabase-service-key

  # Redis
  - secretKey: redis_url
    remoteRef:
      key: backend-redis-url

  # Security
  - secretKey: jwt_secret
    remoteRef:
      key: life-navigator-secret-key
  - secretKey: encryption_key
    remoteRef:
      key: life-navigator-encryption-key

  # Sentry
  - secretKey: sentry_dsn
    remoteRef:
      key: life-navigator-sentry-dsn

  # Other services
  - secretKey: openai_api_key
    remoteRef:
      key: life-navigator-openai-key
  - secretKey: plaid_client_id
    remoteRef:
      key: life-navigator-plaid-client-id
  - secretKey: plaid_secret
    remoteRef:
      key: life-navigator-plaid-secret
  - secretKey: stripe_api_key
    remoteRef:
      key: life-navigator-stripe-key
  - secretKey: resend_api_key
    remoteRef:
      key: life-navigator-resend-key
---
# ExternalSecret for Maverick API Key
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: maverick-secrets
  labels:
    app: maverick
    component: llm-service
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcpsm-secret-store
    kind: ClusterSecretStore
  target:
    name: maverick-secrets
    creationPolicy: Owner
  data:
  - secretKey: api-key
    remoteRef:
      key: maverick-api-key
---
# ExternalSecret for GraphRAG Service
# Note: GraphRAG service is deployed via Terraform and manages its own secrets
# This is a reference for any additional secrets needed
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: graphrag-additional-secrets
  namespace: services
  labels:
    app: graphrag
    component: rag-service
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcpsm-secret-store
    kind: ClusterSecretStore
  target:
    name: graphrag-additional-secrets
    creationPolicy: Owner
  data:
  - secretKey: embeddings-api-key
    remoteRef:
      key: embeddings-service-api-key
      property: value
      decodingStrategy: None
