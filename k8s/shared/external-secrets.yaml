---
# ClusterSecretStore for GCP Secret Manager
# This is created by Terraform in the External Secrets Operator module
# This file is for reference and documentation
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: gcpsm-secret-store
  labels:
    app.kubernetes.io/name: life-navigator
    app.kubernetes.io/component: secret-store
spec:
  provider:
    gcpsm:
      projectID: "PROJECT_ID"
      auth:
        workloadIdentity:
          clusterLocation: us-central1
          clusterName: life-navigator-gke
          serviceAccountRef:
            name: external-secrets-sa
            namespace: external-secrets-system
---
# ExternalSecret for Backend Database Credentials
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: backend-secrets
  labels:
    app: backend
    component: api-server
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcpsm-secret-store
    kind: ClusterSecretStore
  target:
    name: backend-secrets
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # Database URL constructed from secret
        database-url: "postgresql://{{ .db_user }}:{{ .db_password }}@{{ .db_host }}:5432/{{ .db_name }}?sslmode=require"
        # Redis URL
        redis-url: "redis://:{{ .redis_auth }}@{{ .redis_host }}:6379/0"
        # JWT Secret
        jwt-secret-key: "{{ .jwt_secret }}"
        # Neo4j
        neo4j-uri: "{{ .neo4j_uri }}"
        neo4j-password: "{{ .neo4j_password }}"
        # Qdrant
        qdrant-api-key: "{{ .qdrant_api_key }}"
  data:
  # Cloud SQL Database credentials
  - secretKey: db_user
    remoteRef:
      key: cloud-sql-db-user
  - secretKey: db_password
    remoteRef:
      key: cloud-sql-db-password
  - secretKey: db_host
    remoteRef:
      key: cloud-sql-db-host
  - secretKey: db_name
    remoteRef:
      key: cloud-sql-db-name
  # Redis credentials
  - secretKey: redis_auth
    remoteRef:
      key: redis-auth-string
  - secretKey: redis_host
    remoteRef:
      key: redis-host
  # JWT Secret
  - secretKey: jwt_secret
    remoteRef:
      key: jwt-secret-key
  # Neo4j Aura
  - secretKey: neo4j_uri
    remoteRef:
      key: neo4j-aura-connection-string
  - secretKey: neo4j_password
    remoteRef:
      key: neo4j-aura-password
  # Qdrant Cloud
  - secretKey: qdrant_api_key
    remoteRef:
      key: qdrant-cloud-api-key
---
# ExternalSecret for Maverick API Key
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: maverick-secrets
  labels:
    app: maverick
    component: llm-service
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcpsm-secret-store
    kind: ClusterSecretStore
  target:
    name: maverick-secrets
    creationPolicy: Owner
  data:
  - secretKey: api-key
    remoteRef:
      key: maverick-api-key
---
# ExternalSecret for GraphRAG Service
# Note: GraphRAG service is deployed via Terraform and manages its own secrets
# This is a reference for any additional secrets needed
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: graphrag-additional-secrets
  namespace: services
  labels:
    app: graphrag
    component: rag-service
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcpsm-secret-store
    kind: ClusterSecretStore
  target:
    name: graphrag-additional-secrets
    creationPolicy: Owner
  data:
  - secretKey: embeddings-api-key
    remoteRef:
      key: embeddings-service-api-key
      property: value
      decodingStrategy: None
