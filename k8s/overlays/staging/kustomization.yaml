apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: life-navigator-staging

resources:
- ../../base
- ../../shared/ingress.yaml
- ../../shared/external-secrets.yaml

commonLabels:
  environment: staging
  app.kubernetes.io/version: staging

images:
- name: gcr.io/lifenav-prod/life-navigator-backend
  newTag: staging-latest
- name: gcr.io/lifenav-prod/finance-api
  newTag: staging-latest

replicas:
- name: backend
  count: 3

patches:
# Patch deployment for staging environment
- target:
    kind: Deployment
    name: backend
  patch: |-
    - op: replace
      path: /spec/template/spec/containers/0/resources/requests/cpu
      value: 500m
    - op: replace
      path: /spec/template/spec/containers/0/resources/requests/memory
      value: 1Gi
    - op: replace
      path: /spec/template/spec/containers/0/resources/limits/cpu
      value: 2000m
    - op: replace
      path: /spec/template/spec/containers/0/resources/limits/memory
      value: 4Gi

# Patch HPA for staging environment
- target:
    kind: HorizontalPodAutoscaler
    name: backend
  patch: |-
    - op: replace
      path: /spec/minReplicas
      value: 2
    - op: replace
      path: /spec/maxReplicas
      value: 8

# Patch ConfigMap for staging environment
- target:
    kind: ConfigMap
    name: backend-config
  patch: |-
    - op: replace
      path: /data/ENVIRONMENT
      value: "staging"
    - op: replace
      path: /data/LOG_LEVEL
      value: "INFO"
    - op: replace
      path: /data/ENABLE_SWAGGER_UI
      value: "true"
    - op: replace
      path: /data/GRAPHRAG_ENDPOINT
      value: "graphrag-staging.services.svc.cluster.local:50051"
    - op: replace
      path: /data/ENABLE_TRACING
      value: "true"

# Patch ServiceAccount with staging GCP SA
- target:
    kind: ServiceAccount
    name: backend
  patch: |-
    - op: replace
      path: /metadata/annotations/iam.gke.io~1gcp-service-account
      value: "api-server-staging@lifenav-prod.iam.gserviceaccount.com"

# Patch Ingress for staging domain
- target:
    kind: Ingress
    name: life-navigator
  patch: |-
    - op: replace
      path: /spec/rules/0/host
      value: "api-staging.life-navigator.app"
    - op: replace
      path: /spec/tls/0/hosts/0
      value: "api-staging.life-navigator.app"

# Patch ManagedCertificate for staging domain
- target:
    kind: ManagedCertificate
    name: life-navigator-cert
  patch: |-
    - op: replace
      path: /spec/domains/0
      value: "api-staging.life-navigator.app"

# Patch PDB for higher availability
- target:
    kind: PodDisruptionBudget
    name: backend
  patch: |-
    - op: replace
      path: /spec/minAvailable
      value: 2
