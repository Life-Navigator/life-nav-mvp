apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: life-navigator-prod

resources:
- ../../base
- ../../shared/ingress.yaml
- ../../shared/external-secrets.yaml

commonLabels:
  environment: prod
  app.kubernetes.io/version: prod

images:
- name: gcr.io/PROJECT_ID/life-navigator-backend
  newTag: prod-v1.0.0

replicas:
- name: backend
  count: 5

patches:
# Patch deployment for production environment
- target:
    kind: Deployment
    name: backend
  patch: |-
    - op: replace
      path: /spec/template/spec/containers/0/resources/requests/cpu
      value: 1000m
    - op: replace
      path: /spec/template/spec/containers/0/resources/requests/memory
      value: 2Gi
    - op: replace
      path: /spec/template/spec/containers/0/resources/limits/cpu
      value: 4000m
    - op: replace
      path: /spec/template/spec/containers/0/resources/limits/memory
      value: 8Gi

# Patch HPA for production environment
- target:
    kind: HorizontalPodAutoscaler
    name: backend
  patch: |-
    - op: replace
      path: /spec/minReplicas
      value: 3
    - op: replace
      path: /spec/maxReplicas
      value: 20

# Patch ConfigMap for production environment
- target:
    kind: ConfigMap
    name: backend-config
  patch: |-
    - op: replace
      path: /data/ENVIRONMENT
      value: "production"
    - op: replace
      path: /data/LOG_LEVEL
      value: "INFO"
    - op: replace
      path: /data/ENABLE_SWAGGER_UI
      value: "false"
    - op: replace
      path: /data/GRAPHRAG_ENDPOINT
      value: "graphrag-prod.services.svc.cluster.local:50051"
    - op: replace
      path: /data/ENABLE_TRACING
      value: "true"
    - op: replace
      path: /data/ENABLE_METRICS
      value: "true"

# Patch ServiceAccount with prod GCP SA
- target:
    kind: ServiceAccount
    name: backend
  patch: |-
    - op: replace
      path: /metadata/annotations/iam.gke.io~1gcp-service-account
      value: "api-server-prod@PROJECT_ID.iam.gserviceaccount.com"

# Patch Ingress for production domain
- target:
    kind: Ingress
    name: life-navigator
  patch: |-
    - op: replace
      path: /spec/rules/0/host
      value: "api.life-navigator.app"
    - op: replace
      path: /spec/tls/0/hosts/0
      value: "api.life-navigator.app"
    - op: add
      path: /metadata/annotations/kubernetes.io~1ingress.allow-http
      value: "false"

# Patch ManagedCertificate for production domain
- target:
    kind: ManagedCertificate
    name: life-navigator-cert
  patch: |-
    - op: replace
      path: /spec/domains/0
      value: "api.life-navigator.app"

# Patch PDB for high availability
- target:
    kind: PodDisruptionBudget
    name: backend
  patch: |-
    - op: replace
      path: /spec/minAvailable
      value: 3

# Remove docs endpoints from Ingress in production
- target:
    kind: Ingress
    name: life-navigator
  patch: |-
    - op: remove
      path: /spec/rules/0/http/paths/1
    - op: remove
      path: /spec/rules/0/http/paths/1
    - op: remove
      path: /spec/rules/0/http/paths/1
