apiVersion: apps/v1
kind: Deployment
metadata:
  name: imgproxy
  labels:
    app: imgproxy
    component: image-processor
    app.kubernetes.io/name: imgproxy
    app.kubernetes.io/component: image-processor
    app.kubernetes.io/part-of: life-navigator
spec:
  replicas: 2
  selector:
    matchLabels:
      app: imgproxy
      component: image-processor
  template:
    metadata:
      labels:
        app: imgproxy
        component: image-processor
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8081"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: imgproxy
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: imgproxy
        image: darthsim/imgproxy:v3.24
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        - name: metrics
          containerPort: 8081
          protocol: TCP
        env:
        # Security: URL signing (required)
        - name: IMGPROXY_KEY
          valueFrom:
            secretKeyRef:
              name: imgproxy-secrets
              key: IMGPROXY_KEY
        - name: IMGPROXY_SALT
          valueFrom:
            secretKeyRef:
              name: imgproxy-secrets
              key: IMGPROXY_SALT
        # GCS integration
        - name: IMGPROXY_USE_GCS
          value: "true"
        - name: IMGPROXY_GCS_KEY
          valueFrom:
            secretKeyRef:
              name: imgproxy-secrets
              key: GCS_SERVICE_ACCOUNT_KEY
        # Format support
        - name: IMGPROXY_ENABLE_WEBP_DETECTION
          value: "true"
        - name: IMGPROXY_ENABLE_AVIF_DETECTION
          value: "true"
        - name: IMGPROXY_ENFORCE_WEBP
          value: "false"
        - name: IMGPROXY_ENFORCE_AVIF
          value: "false"
        - name: IMGPROXY_PREFERRED_FORMATS
          value: "avif,webp,jpeg"
        # Performance
        - name: IMGPROXY_CONCURRENCY
          value: "20"
        - name: IMGPROXY_MAX_SRC_RESOLUTION
          value: "50"
        - name: IMGPROXY_MAX_SRC_FILE_SIZE
          value: "52428800"
        - name: IMGPROXY_MAX_ANIMATION_FRAMES
          value: "100"
        - name: IMGPROXY_DOWNLOAD_TIMEOUT
          value: "30"
        - name: IMGPROXY_WORKERS
          value: "4"
        - name: IMGPROXY_REQUESTS_QUEUE_SIZE
          value: "100"
        # Caching
        - name: IMGPROXY_CACHE_CONTROL_PASSTHROUGH
          value: "false"
        - name: IMGPROXY_SET_CANONICAL_HEADER
          value: "true"
        # Quality defaults
        - name: IMGPROXY_QUALITY
          value: "80"
        - name: IMGPROXY_AVIF_QUALITY
          value: "75"
        - name: IMGPROXY_WEBP_QUALITY
          value: "80"
        - name: IMGPROXY_JPEG_QUALITY
          value: "85"
        - name: IMGPROXY_PNG_QUANTIZE
          value: "true"
        # Security settings
        - name: IMGPROXY_ALLOW_SECURITY_OPTIONS
          value: "false"
        - name: IMGPROXY_SANITIZE_SVG
          value: "true"
        - name: IMGPROXY_MAX_REDIRECTS
          value: "0"
        # Metrics
        - name: IMGPROXY_PROMETHEUS_BIND
          value: ":8081"
        - name: IMGPROXY_PROMETHEUS_NAMESPACE
          value: "imgproxy"
        # Presets from ConfigMap
        envFrom:
        - configMapRef:
            name: imgproxy-config
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 2000m
            memory: 2Gi
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 3
          timeoutSeconds: 3
          failureThreshold: 10
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: cache
          mountPath: /var/cache/imgproxy
      volumes:
      - name: tmp
        emptyDir:
          sizeLimit: 1Gi
      - name: cache
        emptyDir:
          sizeLimit: 2Gi
      terminationGracePeriodSeconds: 30
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - imgproxy
              topologyKey: kubernetes.io/hostname
