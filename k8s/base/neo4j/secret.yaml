# Neo4j Authentication Secret
# This secret should be created manually or via External Secrets Operator
#
# The auth string format is: neo4j/<password>
#
# To create manually:
# kubectl create secret generic neo4j-secrets \
#   --from-literal=auth="neo4j/YOUR_SECURE_PASSWORD"
#
# For production, use External Secrets Operator to sync from Google Secret Manager

apiVersion: v1
kind: Secret
metadata:
  name: neo4j-secrets
  labels:
    app: neo4j
    component: graph-database
type: Opaque
stringData:
  # Format: neo4j/<password>
  # Replace with actual password or use ExternalSecret
  auth: "neo4j/REPLACE_WITH_SECURE_PASSWORD"
