apiVersion: apps/v1
kind: Deployment
metadata:
  name: finance-api
  labels:
    app: finance-api
    component: api
    tier: application
spec:
  replicas: 2
  selector:
    matchLabels:
      app: finance-api
  template:
    metadata:
      labels:
        app: finance-api
        component: api
        tier: application
    spec:
      serviceAccountName: finance-api

      # Init container for database migrations
      initContainers:
      - name: migrations
        image: gcr.io/lifenav-prod/finance-api:latest
        command: ["alembic", "upgrade", "head"]
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: finance-api-secrets
              key: database-url
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL

      containers:
      - name: finance-api
        image: gcr.io/lifenav-prod/finance-api:latest
        ports:
        - containerPort: 8001
          name: http
          protocol: TCP

        env:
        - name: ENVIRONMENT
          value: "production"
        - name: DEBUG
          value: "false"
        - name: LOG_LEVEL
          value: "INFO"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: finance-api-secrets
              key: database-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: finance-api-secrets
              key: redis-url
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: finance-api-secrets
              key: secret-key
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: finance-api-secrets
              key: anthropic-api-key
        - name: ALLOWED_ORIGINS
          valueFrom:
            configMapKeyRef:
              name: finance-api-config
              key: allowed-origins
        - name: ENABLE_TESSERACT
          value: "true"
        - name: ENABLE_PADDLEOCR
          value: "true"
        - name: ENABLE_DEEPSEEK
          value: "true"
        - name: OCR_CONFIDENCE_THRESHOLD
          value: "0.7"
        - name: PLAID_ENVIRONMENT
          value: "production"

        resources:
          requests:
            cpu: 1000m
            memory: 2Gi
          limits:
            cpu: 2000m
            memory: 4Gi

        volumeMounts:
        - name: ocr-models
          mountPath: /models
          readOnly: false
        - name: cache
          mountPath: /tmp

        livenessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 20
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3

        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false  # OCR models need write access
          capabilities:
            drop:
            - ALL
          seccompProfile:
            type: RuntimeDefault

      volumes:
      - name: ocr-models
        persistentVolumeClaim:
          claimName: ocr-models-pvc
      - name: cache
        emptyDir: {}

      # Pod anti-affinity for high availability
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: finance-api
              topologyKey: kubernetes.io/hostname
