apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: finance-api-secrets
  labels:
    app: finance-api
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcpsm-secret-store
    kind: ClusterSecretStore
  target:
    name: finance-api-secrets
    creationPolicy: Owner
  data:
  - secretKey: database-url
    remoteRef:
      key: database-url
  - secretKey: redis-url
    remoteRef:
      key: redis-url
  - secretKey: secret-key
    remoteRef:
      key: secret-key
  - secretKey: anthropic-api-key
    remoteRef:
      key: anthropic-api-key
  - secretKey: plaid-client-id
    remoteRef:
      key: plaid-client-id
  - secretKey: plaid-secret
    remoteRef:
      key: plaid-secret
