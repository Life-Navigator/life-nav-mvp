apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: finance-api-netpol
  labels:
    app: finance-api
spec:
  podSelector:
    matchLabels:
      app: finance-api
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow traffic from backend and ingress
  - from:
    - podSelector:
        matchLabels:
          app: backend
    - podSelector:
        matchLabels:
          app: nginx-ingress
    ports:
    - port: 8001
      protocol: TCP
  egress:
  # Allow DNS
  - to:
    - namespaceSelector:
        matchLabels:
          name: kube-system
    ports:
    - port: 53
      protocol: UDP
  # Allow PostgreSQL
  - to:
    - podSelector:
        matchLabels:
          app: postgres
    ports:
    - port: 5432
      protocol: TCP
  # Allow Redis
  - to:
    - podSelector:
        matchLabels:
          app: redis
    ports:
    - port: 6379
      protocol: TCP
  # Allow external HTTPS (for API calls)
  - to:
    - namespaceSelector: {}
    ports:
    - port: 443
      protocol: TCP
    - port: 80
      protocol: TCP
