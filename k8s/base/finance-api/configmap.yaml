apiVersion: v1
kind: ConfigMap
metadata:
  name: finance-api-config
  labels:
    app: finance-api
data:
  allowed-origins: "https://app.lifenavigator.ai,https://api.lifenavigator.ai"
  log-level: "INFO"
  enable-tesseract: "true"
  enable-paddleocr: "true"
  enable-deepseek: "true"
  ocr-confidence-threshold: "0.7"
