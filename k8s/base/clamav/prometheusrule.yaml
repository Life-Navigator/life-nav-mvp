apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: clamav-alerts
  labels:
    app: clamav
    prometheus: kube-prometheus
spec:
  groups:
  - name: clamav.rules
    rules:
    # ClamAV availability
    - alert: ClamAVDown
      expr: up{job="clamav"} == 0
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "ClamAV service is down"
        description: "ClamAV has been unavailable for more than 5 minutes"

    # Pod not ready
    - alert: ClamAVPodNotReady
      expr: kube_pod_status_ready{pod=~"clamav.*", condition="true"} == 0
      for: 10m
      labels:
        severity: warning
      annotations:
        summary: "ClamAV pod not ready"
        description: "ClamAV pod {{ $labels.pod }} has been not ready for more than 10 minutes"

    # High memory usage
    - alert: ClamAVHighMemoryUsage
      expr: container_memory_usage_bytes{pod=~"clamav.*", container="clamd"} / container_spec_memory_limit_bytes{pod=~"clamav.*", container="clamd"} > 0.9
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "ClamAV high memory usage"
        description: "ClamAV memory usage is above 90%"

    # High CPU usage
    - alert: ClamAVHighCPUUsage
      expr: rate(container_cpu_usage_seconds_total{pod=~"clamav.*", container="clamd"}[5m]) > 1.8
      for: 10m
      labels:
        severity: warning
      annotations:
        summary: "ClamAV high CPU usage"
        description: "ClamAV CPU usage is consistently high"

    # Freshclam update failures
    - alert: ClamAVSignatureUpdateFailed
      expr: increase(clamav_freshclam_errors_total[1h]) > 3
      for: 0m
      labels:
        severity: warning
      annotations:
        summary: "ClamAV signature update failures"
        description: "Multiple freshclam update failures in the last hour"

    # PVC storage running low
    - alert: ClamAVStorageLow
      expr: kubelet_volume_stats_available_bytes{persistentvolumeclaim="clamav-signatures-pvc"} / kubelet_volume_stats_capacity_bytes{persistentvolumeclaim="clamav-signatures-pvc"} < 0.2
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "ClamAV storage running low"
        description: "ClamAV signature storage is below 20% available"
