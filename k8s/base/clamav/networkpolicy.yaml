apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: clamav
  labels:
    app: clamav
    component: antivirus
spec:
  podSelector:
    matchLabels:
      app: clamav
      component: antivirus
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow from backend services
  - from:
    - podSelector:
        matchLabels:
          app: backend
    - podSelector:
        matchLabels:
          app: finance-api
    ports:
    - protocol: TCP
      port: 3310
  # Allow prometheus scraping
  - from:
    - namespaceSelector:
        matchLabels:
          name: monitoring
    - podSelector:
        matchLabels:
          app: prometheus
    ports:
    - protocol: TCP
      port: 9810
  egress:
  # Allow DNS
  - to:
    - namespaceSelector: {}
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  # Allow signature updates (HTTPS)
  - ports:
    - protocol: TCP
      port: 443
