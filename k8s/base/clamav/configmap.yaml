apiVersion: v1
kind: ConfigMap
metadata:
  name: clamav-config
  labels:
    app: clamav
    component: antivirus
data:
  clamd.conf: |
    # ClamAV daemon configuration
    LocalSocket /tmp/clamd.sock
    TCPSocket 3310
    TCPAddr 0.0.0.0

    # Performance tuning
    MaxScanSize 100M
    MaxFileSize 50M
    MaxRecursion 16
    MaxFiles 10000
    MaxEmbeddedPE 10M
    MaxHTMLNormalize 10M
    MaxHTMLNoTags 2M
    MaxScriptNormalize 5M
    MaxZipTypeRcg 1M
    MaxPartitions 50
    MaxIconsPE 100

    # Timeouts
    ReadTimeout 300
    CommandReadTimeout 30
    SendBufTimeout 200
    MaxQueue 100
    IdleTimeout 30

    # Scanning options
    ScanPE true
    ScanELF true
    ScanOLE2 true
    ScanPDF true
    ScanSWF true
    ScanMail true
    ScanPartialMessages true
    ScanArchive true
    ArchiveBlockEncrypted false

    # Logging
    LogFile /var/log/clamav/clamd.log
    LogFileMaxSize 10M
    LogTime true
    LogClean false
    LogVerbose false

    # Database
    DatabaseDirectory /var/lib/clamav

    # Concurrency
    MaxThreads 12

    # Heuristics
    HeuristicScanPrecedence true
    HeuristicAlerts true

  freshclam.conf: |
    # Freshclam configuration
    DatabaseDirectory /var/lib/clamav
    UpdateLogFile /var/log/clamav/freshclam.log
    LogFileMaxSize 2M
    LogTime true
    LogVerbose false

    # Update settings
    DatabaseOwner clamav
    Checks 4
    DNSDatabaseInfo current.cvd.clamav.net

    # Mirrors
    DatabaseMirror database.clamav.net

    # Receive timeout
    ReceiveTimeout 30
    ConnectTimeout 30

    # Notifications
    NotifyClamd /tmp/clamd.sock
