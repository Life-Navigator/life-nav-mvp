apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: vertex-ai-credentials
  namespace: production
spec:
  secretStoreRef:
    name: gcpsm-secret-store
    kind: ClusterSecretStore
  target:
    name: vertex-ai-credentials
    creationPolicy: Owner
  data:
    - secretKey: GOOGLE_APPLICATION_CREDENTIALS
      remoteRef:
        key: vertex-ai-credentials
    - secretKey: GCP_PROJECT_ID
      remoteRef:
        key: gcp-project-id
