# ===========================================================================
# Database Migration Job - Alembic
# ===========================================================================
# Purpose: Runs database migrations before backend deployment
# Usage: kubectl create job --from=cronjob/db-migrate db-migrate-manual
# ===========================================================================

apiVersion: batch/v1
kind: Job
metadata:
  name: db-migrate
  namespace: life-navigator
  labels:
    app: backend
    component: migration
spec:
  # Only keep last 3 completed jobs
  ttlSecondsAfterFinished: 86400  # 24 hours
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: backend
        component: migration
    spec:
      serviceAccountName: backend
      restartPolicy: OnFailure

      # Init container to wait for database
      initContainers:
        - name: wait-for-db
          image: postgres:15-alpine
          command:
            - sh
            - -c
            - |
              echo "Waiting for database to be ready..."
              until pg_isready -h $DB_HOST -U $DB_USER; do
                echo "Database not ready, waiting..."
                sleep 5
              done
              echo "Database is ready!"
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: DB_HOST
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: username

      containers:
        - name: migrate
          image: gcr.io/lifenav-prod/life-navigator-backend:latest  # Kustomize will replace
          command:
            - /bin/sh
            - -c
            - |
              echo "=================================="
              echo "Database Migration Job"
              echo "=================================="
              echo "Environment: ${ENVIRONMENT}"
              echo "Database: ${DATABASE_URL%%@*}@***"  # Hide password in logs
              echo ""

              # Show current migration status
              echo "Current migration status:"
              alembic current
              echo ""

              # Show migration history
              echo "Migration history:"
              alembic history --verbose
              echo ""

              # Run migrations
              echo "Running migrations..."
              alembic upgrade head

              # Verify migrations completed
              echo ""
              echo "Post-migration status:"
              alembic current
              echo ""
              echo "Migration job completed successfully!"

          env:
            - name: ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: ENVIRONMENT

            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: url

            # Other required environment variables
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: SECRET_KEY

            - name: LOG_LEVEL
              value: "INFO"

          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

          # Security context
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false  # Alembic needs to write temp files

---
