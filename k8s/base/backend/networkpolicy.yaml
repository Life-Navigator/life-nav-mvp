apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: backend
  labels:
    app: backend
    component: api-server
spec:
  podSelector:
    matchLabels:
      app: backend
      component: api-server
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow ingress from ingress controller
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 8000
  # Allow ingress from same namespace (for debugging/admin)
  - from:
    - podSelector: {}
    ports:
    - protocol: TCP
      port: 8000
  egress:
  # Allow DNS
  - to:
    - namespaceSelector:
        matchLabels:
          name: kube-system
    - podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - protocol: UDP
      port: 53
  # Allow Cloud SQL Proxy
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 5432
  # Allow Redis
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 6379
  # Allow Neo4j
  - to:
    - namespaceSelector:
        matchLabels:
          name: databases
    ports:
    - protocol: TCP
      port: 7687
  # Allow GraphRAG gRPC
  - to:
    - namespaceSelector:
        matchLabels:
          name: services
    - podSelector:
        matchLabels:
          app: graphrag
    ports:
    - protocol: TCP
      port: 50051
  # Allow HTTPS for external APIs (Qdrant, etc)
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 443
