apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: agents-secrets
  labels:
    app: agents
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcpsm-secret-store
    kind: ClusterSecretStore
  target:
    name: agents-secrets
    creationPolicy: Owner
  data:
  - secretKey: database-url
    remoteRef:
      key: database-url
  - secretKey: postgres-host
    remoteRef:
      key: postgres-host
  - secretKey: postgres-db
    remoteRef:
      key: postgres-db
  - secretKey: postgres-user
    remoteRef:
      key: postgres-user
  - secretKey: postgres-password
    remoteRef:
      key: postgres-password
  - secretKey: redis-url
    remoteRef:
      key: redis-url
  - secretKey: neo4j-password
    remoteRef:
      key: neo4j-password
  - secretKey: anthropic-api-key
    remoteRef:
      key: anthropic-api-key
  - secretKey: openai-api-key
    remoteRef:
      key: openai-api-key
