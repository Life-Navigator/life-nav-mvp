apiVersion: apps/v1
kind: Deployment
metadata:
  name: agents
  labels:
    app: agents
    component: orchestration
    tier: application
spec:
  replicas: 2
  selector:
    matchLabels:
      app: agents
  template:
    metadata:
      labels:
        app: agents
        component: orchestration
        tier: application
    spec:
      serviceAccountName: agents

      # GPU node selector and tolerations (for embeddings)
      nodeSelector:
        cloud.google.com/gke-nodepool: gpu-t4-pool

      tolerations:
      - key: nvidia.com/gpu
        operator: Equal
        value: present
        effect: NoSchedule

      containers:
      - name: agents
        image: gcr.io/PROJECT_ID/agents:latest
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP

        env:
        - name: ENVIRONMENT
          value: "production"
        - name: DEBUG
          value: "false"
        - name: LOG_LEVEL
          value: "INFO"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: agents-secrets
              key: database-url
        - name: POSTGRES_HOST
          valueFrom:
            secretKeyRef:
              name: agents-secrets
              key: postgres-host
        - name: POSTGRES_PORT
          value: "5432"
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: agents-secrets
              key: postgres-db
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: agents-secrets
              key: postgres-user
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: agents-secrets
              key: postgres-password
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: agents-secrets
              key: redis-url
        - name: NEO4J_URI
          valueFrom:
            configMapKeyRef:
              name: agents-config
              key: neo4j-uri
        - name: NEO4J_USER
          value: "neo4j"
        - name: NEO4J_PASSWORD
          valueFrom:
            secretKeyRef:
              name: agents-secrets
              key: neo4j-password
        - name: QDRANT_URL
          valueFrom:
            configMapKeyRef:
              name: agents-config
              key: qdrant-url
        - name: GRAPHDB_URL
          valueFrom:
            configMapKeyRef:
              name: agents-config
              key: graphdb-url
        - name: GRAPHRAG_URL
          valueFrom:
            configMapKeyRef:
              name: agents-config
              key: graphrag-url
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: agents-secrets
              key: anthropic-api-key
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: agents-secrets
              key: openai-api-key
              optional: true
        - name: ENABLE_GPU
          value: "true"
        - name: USE_LOCAL_EMBEDDINGS
          value: "true"

        resources:
          requests:
            cpu: 2000m
            memory: 8Gi
            nvidia.com/gpu: 1
          limits:
            cpu: 4000m
            memory: 16Gi
            nvidia.com/gpu: 1

        volumeMounts:
        - name: cache
          mountPath: /tmp

        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3

        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
          seccompProfile:
            type: RuntimeDefault

      volumes:
      - name: cache
        emptyDir: {}

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: agents
              topologyKey: kubernetes.io/hostname
