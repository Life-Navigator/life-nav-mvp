apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-server
  labels:
    app: mcp-server
    component: protocol
    tier: application
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mcp-server
  template:
    metadata:
      labels:
        app: mcp-server
        component: protocol
        tier: application
    spec:
      serviceAccountName: mcp-server

      containers:
      - name: mcp-server
        image: gcr.io/PROJECT_ID/mcp-server:latest
        ports:
        - containerPort: 8090
          name: http
          protocol: TCP

        env:
        - name: ENVIRONMENT
          value: "production"
        - name: DEBUG
          value: "false"
        - name: LOG_LEVEL
          value: "INFO"
        - name: APP_NAME
          value: "MCP Server"
        - name: APP_VERSION
          value: "1.0.0"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: mcp-server-secrets
              key: database-url
        - name: POSTGRES_HOST
          valueFrom:
            secretKeyRef:
              name: mcp-server-secrets
              key: postgres-host
        - name: POSTGRES_PORT
          value: "5432"
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: mcp-server-secrets
              key: postgres-db
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: mcp-server-secrets
              key: postgres-user
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mcp-server-secrets
              key: postgres-password
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: mcp-server-secrets
              key: redis-url
        - name: NEO4J_URI
          valueFrom:
            configMapKeyRef:
              name: mcp-server-config
              key: neo4j-uri
        - name: NEO4J_USER
          value: "neo4j"
        - name: NEO4J_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mcp-server-secrets
              key: neo4j-password
        - name: QDRANT_URL
          valueFrom:
            configMapKeyRef:
              name: mcp-server-config
              key: qdrant-url
        - name: GRAPHDB_URL
          valueFrom:
            configMapKeyRef:
              name: mcp-server-config
              key: graphdb-url
        - name: GRAPHRAG_URL
          valueFrom:
            configMapKeyRef:
              name: mcp-server-config
              key: graphrag-url
        - name: LLM_ENDPOINT
          valueFrom:
            configMapKeyRef:
              name: mcp-server-config
              key: llm-endpoint
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: mcp-server-secrets
              key: anthropic-api-key

        resources:
          requests:
            cpu: 1000m
            memory: 2Gi
          limits:
            cpu: 2000m
            memory: 4Gi

        volumeMounts:
        - name: cache
          mountPath: /tmp

        livenessProbe:
          httpGet:
            path: /health
            port: 8090
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /health
            port: 8090
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3

        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
          seccompProfile:
            type: RuntimeDefault

      volumes:
      - name: cache
        emptyDir: {}

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: mcp-server
              topologyKey: kubernetes.io/hostname
