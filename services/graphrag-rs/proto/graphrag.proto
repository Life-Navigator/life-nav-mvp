syntax = "proto3";

package graphrag.v1;

// GraphRAG Service - Hybrid knowledge graph + vector RAG
service GraphRAG {
  // Query with RAG (centralized mode - org-wide knowledge)
  rpc QueryCentralized(QueryRequest) returns (QueryResponse);

  // Query with RAG (personalized mode - user-specific with RLS)
  rpc QueryPersonalized(PersonalizedQueryRequest) returns (QueryResponse);

  // Semantic search in knowledge graph
  rpc SemanticSearch(SemanticSearchRequest) returns (SemanticSearchResponse);

  // Vector similarity search
  rpc VectorSearch(VectorSearchRequest) returns (VectorSearchResponse);

  // Hybrid search (knowledge graph + vectors)
  rpc HybridSearch(HybridSearchRequest) returns (HybridSearchResponse);

  // Get entity by URI
  rpc GetEntity(GetEntityRequest) returns (Entity);

  // Get entity relationships
  rpc GetRelationships(GetRelationshipsRequest) returns (RelationshipsResponse);

  // Stream entities matching criteria
  rpc StreamEntities(StreamEntitiesRequest) returns (stream Entity);

  // Health check
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);
}

// Query request for centralized mode
message QueryRequest {
  string query = 1;                    // Natural language query
  int32 max_results = 2;               // Max results to return (default: 10)
  repeated string domains = 3;         // Filter by domains (finance, health, etc.)
  map<string, string> filters = 4;     // Additional filters
  bool include_sources = 5;            // Include source attribution
  bool include_reasoning = 6;          // Include reasoning steps
}

// Query request for personalized mode (with RLS)
message PersonalizedQueryRequest {
  string query = 1;
  string user_id = 2;                  // User ID for RLS filtering
  string tenant_id = 3;                // Tenant ID for multi-tenancy
  int32 max_results = 4;
  repeated string domains = 5;
  map<string, string> filters = 6;
  bool include_sources = 7;
  bool include_reasoning = 8;
}

// Query response with RAG results
message QueryResponse {
  string answer = 1;                   // Generated answer
  repeated Source sources = 2;         // Knowledge sources used
  repeated ReasoningStep reasoning = 3; // Reasoning steps
  double confidence = 4;               // Confidence score (0.0-1.0)
  repeated Entity entities = 5;        // Related entities
  int64 duration_ms = 6;               // Query duration
}

// Semantic search request (SPARQL-based)
message SemanticSearchRequest {
  string query = 1;                    // Search query
  string entity_type = 2;              // Filter by entity type (ln:Goal, ln:Transaction, etc.)
  int32 limit = 3;                     // Max results
  string tenant_id = 4;                // Tenant isolation
  map<string, string> filters = 5;
}

// Semantic search response
message SemanticSearchResponse {
  repeated Entity entities = 1;
  int32 total_count = 2;
  int64 duration_ms = 3;
}

// Vector search request
message VectorSearchRequest {
  repeated float query_vector = 1;     // Query embedding (or text to embed)
  string query_text = 2;               // Alternative: text to embed
  int32 limit = 3;
  double min_score = 4;                // Minimum similarity score
  string collection_name = 5;          // Qdrant collection
  map<string, string> filters = 6;
}

// Vector search response
message VectorSearchResponse {
  repeated VectorResult results = 1;
  int64 duration_ms = 2;
}

// Hybrid search (combines semantic + vector)
message HybridSearchRequest {
  string query = 1;
  int32 limit = 2;
  string tenant_id = 3;
  repeated string domains = 4;
  double semantic_weight = 5;          // Weight for semantic results (0.0-1.0)
  double vector_weight = 6;            // Weight for vector results (0.0-1.0)
}

// Hybrid search response
message HybridSearchResponse {
  repeated HybridResult results = 1;
  int64 duration_ms = 2;
}

// Get entity by URI
message GetEntityRequest {
  string uri = 1;                      // Entity URI (e.g., ln:person/123)
  bool include_relationships = 2;       // Include related entities
  int32 relationship_depth = 3;        // Depth of relationship traversal (default: 1)
}

// Get entity relationships
message GetRelationshipsRequest {
  string entity_uri = 1;
  string relationship_type = 2;        // Filter by relationship type
  string direction = 3;                // "outgoing", "incoming", "both"
  int32 limit = 4;
}

// Relationships response
message RelationshipsResponse {
  repeated Relationship relationships = 1;
  int32 total_count = 2;
}

// Stream entities request
message StreamEntitiesRequest {
  string entity_type = 1;
  string tenant_id = 2;
  map<string, string> filters = 3;
  int32 batch_size = 4;                // Streaming batch size
}

// Health check
message HealthCheckRequest {}

message HealthCheckResponse {
  string status = 1;                   // "healthy" or "unhealthy"
  map<string, string> services = 2;    // Service health: neo4j, qdrant, graphdb
  string version = 3;
}

// Entity representation
message Entity {
  string uri = 1;                      // Unique URI
  string type = 2;                     // Entity type (ln:Goal, ln:Transaction, etc.)
  string label = 3;                    // Human-readable label
  map<string, string> properties = 4;  // Key-value properties
  repeated Relationship relationships = 5; // Related entities
  string tenant_id = 6;
  string created_at = 7;
  string updated_at = 8;
}

// Relationship between entities
message Relationship {
  string predicate = 1;                // Relationship type (ln:hasGoal, ln:relatedTo, etc.)
  string subject_uri = 2;              // Source entity
  string object_uri = 3;               // Target entity
  Entity object = 4;                   // Full target entity (optional)
}

// Knowledge source
message Source {
  string source_type = 1;              // "knowledge_graph", "vector_db", "llm"
  string source_uri = 2;               // Entity URI or document ID
  string content = 3;                  // Source content snippet
  double relevance = 4;                // Relevance score
  map<string, string> metadata = 5;
}

// Reasoning step for explainability
message ReasoningStep {
  int32 step = 1;
  string description = 2;
  string action = 3;
  string result = 4;
}

// Vector search result
message VectorResult {
  string id = 1;
  double score = 2;
  string content = 3;
  map<string, string> metadata = 4;
  repeated float vector = 5;
}

// Hybrid search result
message HybridResult {
  Entity entity = 1;
  double semantic_score = 2;
  double vector_score = 3;
  double combined_score = 4;
  string matched_by = 5;               // "semantic", "vector", "both"
}
