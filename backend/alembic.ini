# ===========================================================================
# Alembic Database Migration Configuration
# ===========================================================================
# Documentation: https://alembic.sqlalchemy.org/en/latest/
# ===========================================================================

[alembic]
# Path to migration scripts
script_location = alembic

# Template used to generate migration files
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present
prepend_sys_path = .

# Timezone to use when rendering the date within the migration file
# Leave undefined for localtime
# timezone =

# Max length of characters to apply to the "slug" field
# truncate_slug_length = 40

# Set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# Set to 'true' to allow .pyc and .pyo files without
# a source .py file to be detected as revisions in the
# versions/ directory
# sourceless = false

# Version location specification
version_locations = %(here)s/alembic/versions

# Version path separator; set to 'os' to use os.pathsep
# version_path_separator = :

# The output encoding used when revision files are written from the script.py.mako
# output_encoding = utf-8

# Database URL (can be overridden by environment variable)
# DO NOT PUT REAL CREDENTIALS HERE - use environment variables
sqlalchemy.url = driver://user:pass@localhost/dbname


[post_write_hooks]
# Post-write hooks enable running commands on newly generated revision files
# Format: <hookname> = <hookvalue>

# Hook to format new migration files with Black
hooks = black
black.type = console_scripts
black.entrypoint = black
black.options = --line-length 100 REVISION_SCRIPT_FILENAME


# ===========================================================================
# Logging Configuration
# ===========================================================================

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
