[pytest]
# Pytest configuration for Life Navigator Backend

# Minimum pytest version
minversion = 7.0

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Asyncio mode (auto-detect async tests)
asyncio_mode = auto

# Additional options
addopts =
    # Show test summary for all outcomes
    -ra
    # Quiet output
    -q
    # Strict marker enforcement
    --strict-markers
    # Coverage options
    --cov=app
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml
    # Show local variables in tracebacks
    --showlocals
    # Verbose on failures
    --tb=short
    # Warnings
    -W error::Warning
    -W ignore::DeprecationWarning

# Markers for test categorization
markers =
    asyncio: Mark test as async
    unit: Unit tests (fast, isolated)
    integration: Integration tests (slower, database required)
    slow: Slow tests (skip with -m "not slow")
    auth: Authentication tests
    rls: Row-Level Security tests
    api: API endpoint tests
    db: Database tests

# Logging
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Coverage configuration
[coverage:run]
source = app
omit =
    */tests/*
    */migrations/*
    */alembic/*
    */__init__.py
    */conftest.py

[coverage:report]
precision = 2
show_missing = true
skip_covered = false
exclude_lines =
    # Pragmas
    pragma: no cover
    # Debug code
    def __repr__
    def __str__
    # Defensive programming
    raise AssertionError
    raise NotImplementedError
    # Type checking
    if TYPE_CHECKING:
    if typing.TYPE_CHECKING:
    # Abstract methods
    @(abc\.)?abstractmethod
    # Main blocks
    if __name__ == .__main__.:
    # Protocols
    class .*\bProtocol\):

[coverage:html]
directory = htmlcov
